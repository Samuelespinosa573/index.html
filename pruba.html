<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech - Publica y Comparte</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Google Sans', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 2rem; z-index: 100;
        }

        .logo {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(to right, #818cf8, #e0e7ff);
            -webkit-background-clip: text;
            background-clip: text; /* CORRECCIÓN PARA VS CODE */
            -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 0.5rem;
        }

        /* --- MENÚ DESPLEGABLE --- */
        .menu-container { position: relative; }
        .menu-dots-btn {
            background: none; border: none; color: var(--text-main);
            font-size: 1.5rem; cursor: pointer; padding: 0.5rem; transition: 0.2s;
        }
        .dropdown-menu {
            position: absolute; top: 100%; right: 0;
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 12px; width: 220px; margin-top: 0.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none; flex-direction: column; overflow: hidden;
        }
        .dropdown-menu.active { display: flex; }
        .dropdown-menu button {
            background: none; border: none; color: var(--text-main);
            padding: 1rem; text-align: left; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .dropdown-menu button:hover { background: rgba(255, 255, 255, 0.1); }

        /* --- CONTENIDO PRINCIPAL --- */
        main { margin-top: 100px; padding: 2rem; max-width: 1300px; margin-left: auto; margin-right: auto; }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2rem;
        }

        .book-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 1rem; cursor: pointer;
            transition: 0.3s ease; backdrop-filter: blur(4px);
        }
        .book-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .book-cover-wrapper {
            width: 100%; height: 280px; border-radius: 10px;
            overflow: hidden; background: #020617; margin-bottom: 1rem;
        }
        .book-cover { width: 100%; height: 100%; object-fit: cover; }
        .book-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
        .book-author { font-size: 0.9rem; color: var(--text-muted); }

        /* --- MODALES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
            z-index: 200; display: none; justify-content: center; align-items: center; padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #1e293b; border: 1px solid var(--glass-border);
            border-radius: 20px; width: 100%; max-width: 500px;
            padding: 2rem; position: relative; max-height: 90vh; overflow-y: auto;
        }
        .modal-content-large { max-width: 1000px; display: flex; gap: 2rem; }

        @media (max-width: 850px) {
            .modal-content-large { flex-direction: column; }
        }

        /* --- FORMULARIOS --- */
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 0.8rem; background: #0f172a;
            border: 1px solid var(--glass-border); border-radius: 8px;
            color: white; outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }

        .file-input-label {
            display: block; padding: 1rem; border: 2px dashed var(--glass-border);
            text-align: center; border-radius: 10px; cursor: pointer; color: var(--text-muted);
        }
        .file-input-label:hover { border-color: var(--accent); color: white; }

        .btn-primary {
            width: 100%; padding: 0.8rem; background: var(--accent);
            border: none; border-radius: 8px; color: white; font-weight: 600;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover { background: var(--accent-hover); }

        /* --- RESEÑAS --- */
        .reviews-box { flex: 1; display: flex; flex-direction: column; gap: 1rem; }
        .review-list { max-height: 300px; overflow-y: auto; margin: 10px 0; }
        .review-item {
            background: rgba(255,255,255,0.03); padding: 10px;
            border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--glass-border);
        }
        .pos { border-left-color: var(--success); }
        .neg { border-left-color: var(--danger); }

        /* --- UTILIDADES --- */
        .close-btn { position: absolute; top: 1rem; right: 1rem; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; }
        .loader {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #toast {
            position: fixed; bottom: 20px; right: 20px; background: #334155;
            padding: 12px 24px; border-radius: 8px; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-book-open"></i> Bibliotech</div>
        <div class="menu-container">
            <button class="menu-dots-btn" id="dotsBtn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            <div class="dropdown-menu" id="dropMenu">
                <button id="btnOpenPublish"><i class="fa-solid fa-plus"></i> Publicar Libro</button>
                <button id="btnOpenAuth"><i class="fa-solid fa-user"></i> Mi Cuenta</button>
                <button id="btnLogout" style="display:none; color: var(--danger);"><i class="fa-solid fa-power-off"></i> Salir</button>
            </div>
        </div>
    </header>

    <main>
        <h2 id="welcomeText" style="margin-bottom: 1.5rem; font-weight: 400;">Bienvenido a la biblioteca digital</h2>
        <div class="books-grid" id="mainGrid">
            </div>
    </main>

    <div class="modal-overlay" id="modalAuth">
        <div class="modal-content">
            <span class="close-btn" onclick="closeM('modalAuth')">&times;</span>
            <h2 id="authTitle" style="margin-bottom: 1rem;">Iniciar Sesión</h2>
            <form id="formAuth">
                <div class="form-group" id="groupName" style="display:none;">
                    <label>Nombre de Escritor</label>
                    <input type="text" id="regName">
                </div>
                <div class="form-group">
                    <label>Correo</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPass" required>
                </div>
                <button type="submit" class="btn-primary" id="btnAuthAction">Entrar</button>
                <p style="text-align:center; margin-top:1rem; font-size:0.9rem;">
                    <a href="#" id="toggleAuth" style="color:var(--accent);">¿No tienes cuenta? Regístrate</a>
                </p>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalPub">
        <div class="modal-content">
            <span class="close-btn" onclick="closeM('modalPub')">&times;</span>
            <h2 id="pubTitle">Subir nuevo libro</h2>
            <form id="formPub" style="margin-top:1rem;">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="pubTitleIn" required>
                </div>
                <div class="form-group">
                    <label>Portada (Imagen)</label>
                    <label for="fCover" class="file-input-label" id="lCover">Click para subir imagen</label>
                    <input type="file" id="fCover" accept="image/*" style="display:none;">
                </div>
                <div class="form-group">
                    <label>Libro (PDF)</label>
                    <label for="fPdf" class="file-input-label" id="lPdf">Click para subir PDF</label>
                    <input type="file" id="fPdf" accept="application/pdf" style="display:none;">
                </div>
                <button type="submit" class="btn-primary">
                    <span id="txtBtnPub">Guardar Libro</span>
                    <div class="loader" id="pubLoad"></div>
                </button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalDet">
        <div class="modal-content modal-content-large">
            <span class="close-btn" onclick="closeM('modalDet')">&times;</span>
            <div style="flex: 1; text-align: center;">
                <img id="detImg" src="" style="width:100%; max-height:400px; object-fit:contain; border-radius:12px;">
                <h2 id="detTitle" style="margin:1rem 0 0.5rem 0;"></h2>
                <p id="detAuthor" style="color:var(--text-muted); margin-bottom:1rem;"></p>
                <a id="detLink" href="#" target="_blank" class="btn-primary" style="text-decoration:none;">Leer ahora (PDF)</a>
                <button id="btnEdit" class="btn-primary" style="margin-top:10px; background:#475569; display:none;">Editar mi libro</button>
            </div>
            <div class="reviews-box">
                <h3>Reseñas de lectores</h3>
                <div class="review-list" id="revList"></div>
                <form id="formRev">
                    <textarea id="revCom" placeholder="¿Qué te pareció este libro?" required style="width:100%; background:#0f172a; color:white; border:1px solid var(--glass-border); border-radius:8px; padding:10px;"></textarea>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button type="button" onclick="setV(true)" id="vPos" class="btn-primary" style="background:#1e293b; border:1px solid var(--success);">Positiva</button>
                        <button type="button" onclick="setV(false)" id="vNeg" class="btn-primary" style="background:#1e293b; border:1px solid var(--danger);">Negativa</button>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top:10px; height:35px;">Publicar reseña</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";

        // CONFIGURACIÓN DE FIREBASE (RELLENA ESTO)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let userAct = null;
        let isReg = false;
        let vSel = null; 
        let currentBId = null;

        // UI HELPERS
        const dotsBtn = document.getElementById('dotsBtn');
        const dropMenu = document.getElementById('dropMenu');
        dotsBtn.onclick = (e) => { e.stopPropagation(); dropMenu.classList.toggle('active'); };
        document.onclick = () => dropMenu.classList.remove('active');
        window.closeM = (id) => document.getElementById(id).classList.remove('active');
        const msg = (t) => { const x = document.getElementById('toast'); x.innerText = t; x.style.display='block'; setTimeout(()=>x.style.display='none', 3000); };

        // AUTH LOGIC
        document.getElementById('toggleAuth').onclick = () => {
            isReg = !isReg;
            document.getElementById('groupName').style.display = isReg ? 'block' : 'none';
            document.getElementById('authTitle').innerText = isReg ? 'Crear Cuenta' : 'Iniciar Sesión';
            document.getElementById('btnAuthAction').innerText = isReg ? 'Registrarse' : 'Entrar';
        };

        document.getElementById('formAuth').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            try {
                if(isReg){
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: document.getElementById('regName').value });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                closeM('modalAuth');
            } catch (err) { msg("Error: " + err.message); }
        };

        onAuthStateChanged(auth, (u) => {
            userAct = u;
            document.getElementById('btnLogout').style.display = u ? 'flex' : 'none';
            document.getElementById('welcomeText').innerText = u ? `Hola, ${u.displayName}` : "Bienvenido a la biblioteca digital";
        });

        document.getElementById('btnLogout').onclick = () => signOut(auth);
        document.getElementById('btnOpenAuth').onclick = () => u ? msg("Ya estás conectado") : document.getElementById('modalAuth').classList.add('active');
        document.getElementById('btnOpenPublish').onclick = () => userAct ? document.getElementById('modalPub').classList.add('active') : msg("Inicia sesión primero");

        // STORAGE LOGIC
        document.getElementById('fCover').onchange = (e) => document.getElementById('lCover').innerText = e.target.files[0].name;
        document.getElementById('fPdf').onchange = (e) => document.getElementById('lPdf').innerText = e.target.files[0].name;

        document.getElementById('formPub').onsubmit = async (e) => {
            e.preventDefault();
            const loader = document.getElementById('pubLoad');
            const editId = document.getElementById('editId').value;
            loader.style.display = 'inline-block';

            try {
                let cUrl = null, pUrl = null;
                const fC = document.getElementById('fCover').files[0];
                const fP = document.getElementById('fPdf').files[0];

                if(fC) { const r = ref(storage, `c/${Date.now()}`); await uploadBytes(r, fC); cUrl = await getDownloadURL(r); }
                if(fP) { const r = ref(storage, `p/${Date.now()}`); await uploadBytes(r, fP); pUrl = await getDownloadURL(r); }

                const data = { title: document.getElementById('pubTitleIn').value };
                if(cUrl) data.coverUrl = cUrl;
                if(pUrl) data.pdfUrl = pUrl;

                if(editId) {
                    await updateDoc(doc(db, "libros", editId), data);
                } else {
                    data.authorName = userAct.displayName;
                    data.uid = userAct.uid;
                    data.createdAt = Date.now();
                    await addDoc(collection(db, "libros"), data);
                }
                closeM('modalPub');
                document.getElementById('formPub').reset();
            } catch (err) { msg("Error: " + err.message); }
            loader.style.display = 'none';
        };

        // RENDER BOOKS
        onSnapshot(query(collection(db, "libros"), orderBy("createdAt", "desc")), (snap) => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const b = d.data();
                const el = document.createElement('div');
                el.className = 'book-card';
                el.innerHTML = `<div class="book-cover-wrapper"><img src="${b.coverUrl}" class="book-cover"></div>
                                <div class="book-title">${b.title}</div><div class="book-author">${b.authorName}</div>`;
                el.onclick = () => openDet(d.id, b);
                grid.appendChild(el);
            });
        });

        function openDet(id, b) {
            currentBId = id;
            document.getElementById('detImg').src = b.coverUrl;
            document.getElementById('detTitle').innerText = b.title;
            document.getElementById('detAuthor').innerText = "Por: " + b.authorName;
            document.getElementById('detLink').href = b.pdfUrl;
            
            const bEdit = document.getElementById('btnEdit');
            bEdit.style.display = (userAct && userAct.uid === b.uid) ? 'block' : 'none';
            bEdit.onclick = () => {
                closeM('modalDet');
                document.getElementById('editId').value = id;
                document.getElementById('pubTitleIn').value = b.title;
                document.getElementById('modalPub').classList.add('active');
            };

            loadRev(id);
            document.getElementById('modalDet').classList.add('active');
        }

        // REVIEWS
        window.setV = (v) => {
            vSel = v;
            document.getElementById('vPos').style.background = v ? 'var(--success)' : '#1e293b';
            document.getElementById('vNeg').style.background = v === false ? 'var(--danger)' : '#1e293b';
        };

        document.getElementById('formRev').onsubmit = async (e) => {
            e.preventDefault();
            if(vSel === null) return msg("Elige Positiva o Negativa");
            await addDoc(collection(db, `libros/${currentBId}/revs`), {
                user: userAct ? userAct.displayName : "Anónimo",
                com: document.getElementById('revCom').value,
                isP: vSel,
                at: Date.now()
            });
            document.getElementById('formRev').reset();
            setV(null);
        };

        function loadRev(id) {
            onSnapshot(query(collection(db, `libros/${id}/revs`), orderBy("at", "desc")), (snap) => {
                const list = document.getElementById('revList');
                list.innerHTML = "";
                snap.forEach(d => {
                    const r = d.data();
                    const item = document.createElement('div');
                    item.className = `review-item ${r.isP ? 'pos' : 'neg'}`;
                    item.innerHTML = `<strong>${r.user}</strong><p>${r.com}</p>`;
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
