<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech - Reseñas y Calificaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); --accent: #6366f1; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; margin: 0; padding-top: 80px; }
        
        header { 
            height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 2rem; border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box;
        }

        .logo { font-weight: 700; font-size: 1.5rem; color: #818cf8; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }

        .book-card { background: var(--glass); border-radius: 15px; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; text-align: center; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .book-cover { width: 100%; height: 260px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }

        /* Estilos del Modal Expandido */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 200; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 20px; width: 100%; max-width: 850px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        .book-detail-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        @media (max-width: 768px) { .book-detail-layout { grid-template-columns: 1fr; } }

        .review-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .stars-display { color: #fbbf24; font-size: 0.9rem; }
        
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        .close { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-book-open-reader"></i> Bibliotech</div>
        <button class="btn" style="width: auto;" onclick="document.getElementById('modalBook').classList.add('active')">Publicar Libro</button>
    </header>

    <div class="books-grid" id="grid"></div>

    <div class="modal" id="modalView">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalView')">&times;</span>
            
            <div class="book-detail-layout">
                <div id="bookSide">
                    <img id="viewCover" src="" style="width: 100%; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
                    <h2 id="viewTitle" style="margin: 15px 0 5px;"></h2>
                    <p id="viewAuthor" style="color: #94a3b8; margin-bottom: 20px;"></p>
                    <button class="btn" id="btnRead" style="background: #22c55e;">Leer Libro (PDF)</button>
                </div>

                <div>
                    <h3>Reseñas de Lectores</h3>
                    <div id="statsBox" style="background: var(--glass); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem;"></div>
                    
                    <div id="reviewsList" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 10px;">
                        </div>

                    <hr style="opacity: 0.1; margin: 20px 0;">
                    
                    <h4>Deja tu reseña</h4>
                    <form id="fReview">
                        <input type="hidden" id="rBookId">
                        <input type="text" id="rUser" placeholder="Tu nombre o alias" required>
                        <div style="display: flex; gap: 10px;">
                            <select id="rStars">
                                <option value="5">⭐⭐⭐⭐⭐</option>
                                <option value="4">⭐⭐⭐⭐</option>
                                <option value="3">⭐⭐⭐</option>
                                <option value="2">⭐⭐</option>
                                <option value="1">⭐</option>
                            </select>
                            <select id="rVote">
                                <option value="pos">👍 Recomendado</option>
                                <option value="neg">👎 No recomendado</option>
                            </select>
                        </div>
                        <textarea id="rComment" placeholder="¿Qué te pareció el libro?" rows="2" required></textarea>
                        <input type="password" id="rCode" placeholder="Crea un código para esta reseña" required>
                        <button type="submit" class="btn">Publicar Reseña</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="modalBook" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close" onclick="closeM('modalBook')">&times;</span>
            <h3>Publicar Libro</h3>
            <form id="fBook">
                <input type="text" id="pTitle" placeholder="Título" required>
                <input type="text" id="pAuthor" placeholder="Escritor" required>
                <input type="url" id="pCover" placeholder="URL Portada" required>
                <input type="url" id="pPdf" placeholder="URL PDF" required>
                <input type="password" id="pCode" placeholder="Código de seguridad" required>
                <button type="submit" class="btn">Guardar</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Configuración de tu proyecto
        const firebaseConfig = {
            apiKey: "AIzaSyAocuJ_tFSsKKqKXtggvrrZgWDAPqt2uek",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.closeM = (id) => document.getElementById(id).classList.remove('active');

        // Cargar Libros en la Cuadrícula
        onSnapshot(query(collection(db, "libros"), orderBy("date", "desc")), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const b = d.data();
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `<img src="${b.cover}" class="book-cover"><strong>${b.title}</strong><br><small>${b.author}</small>`;
                card.onclick = () => showDetail(d.id, b);
                grid.appendChild(card);
            });
        });

        // Abrir Detalle del Libro
        window.showDetail = (id, b) => {
            document.getElementById('rBookId').value = id;
            document.getElementById('viewCover').src = b.cover;
            document.getElementById('viewTitle').innerText = b.title;
            document.getElementById('viewAuthor').innerText = "Escrito por: " + b.author;
            document.getElementById('btnRead').onclick = () => window.open(b.pdf, '_blank');
            
            loadReviews(id);
            document.getElementById('modalView').classList.add('active');
        };

        // Guardar Reseña
        document.getElementById('fReview').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "reseñas"), {
                bookId: document.getElementById('rBookId').value,
                user: document.getElementById('rUser').value,
                stars: parseInt(document.getElementById('rStars').value),
                vote: document.getElementById('rVote').value,
                comment: document.getElementById('rComment').value,
                code: document.getElementById('rCode').value,
                date: Date.now()
            });
            document.getElementById('fReview').reset();
            alert("¡Reseña publicada!");
        };

        // Cargar y Escuchar Reseñas en Tiempo Real
        function loadReviews(bookId) {
            const q = query(collection(db, "reseñas"), where("bookId", "==", bookId), orderBy("date", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('reviewsList');
                const stats = document.getElementById('statsBox');
                let totalStars = 0, count = 0;
                list.innerHTML = "";

                snap.forEach(d => {
                    const r = d.data();
                    totalStars += r.stars;
                    count++;
                    
                    const div = document.createElement('div');
                    div.className = 'review-card';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <strong>${r.user} ${r.vote == 'pos' ? '👍' : '👎'}</strong>
                            <span class="stars-display">${"⭐".repeat(r.stars)}</span>
                        </div>
                        <p style="margin:0; font-size:0.9rem; color:#cbd5e1;">${r.comment}</p>
                        <button onclick="deleteR('${d.id}', '${r.code}')" style="background:none; border:none; color:#f87171; font-size:0.7rem; cursor:pointer; margin-top:10px;">Eliminar reseña</button>
                    `;
                    list.appendChild(div);
                });

                if(count === 0) {
                    list.innerHTML = "<p style='color:#64748b'>Aún no hay reseñas. ¡Sé el primero!</p>";
                    stats.innerHTML = "Sin calificaciones todavía.";
                } else {
                    const avg = (totalStars / count).toFixed(1);
                    stats.innerHTML = `⭐ Promedio: <strong>${avg}</strong> | 💬 <strong>${count}</strong> comentarios`;
                }
            });
        }

        // Eliminar Reseña con código
        window.deleteR = async (id, originalCode) => {
            const check = prompt("Ingresa el código que creaste para esta reseña:");
            if(check === originalCode) {
                await deleteDoc(doc(db, "reseñas", id));
                alert("Reseña eliminada.");
            } else {
                alert("Código incorrecto.");
            }
        };

        // Publicar Libro Nuevo
        document.getElementById('fBook').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "libros"), {
                title: document.getElementById('pTitle').value,
                author: document.getElementById('pAuthor').value,
                cover: document.getElementById('pCover').value,
                pdf: document.getElementById('pPdf').value,
                code: document.getElementById('pCode').value,
                date: Date.now()
            });
            closeM('modalBook');
            document.getElementById('fBook').reset();
        };
    </script>
</body>
</html>
