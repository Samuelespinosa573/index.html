<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech - Enlaces Externos</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #6366f1;
            --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; margin: 0; }
        header { 
            height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 2rem; border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box;
        }
        .logo { font-weight: 700; font-size: 1.5rem; background: linear-gradient(to right, #818cf8, #e0e7ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        main { padding: 100px 2rem 2rem; max-width: 1200px; margin: 0 auto; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; }
        .book-card { background: var(--glass); border-radius: 15px; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .book-cover { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #1e293b; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 200; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 20px; width: 100%; max-width: 500px; position: relative; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; box-sizing: border-box; }
        .close { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Bibliotech</div>
        <div>
            <button class="btn" onclick="openM('modalPub')"><i class="fa-solid fa-plus"></i> Publicar</button>
            <button class="btn" style="background: #334155;" onclick="openM('modalAuth')"><i class="fa-solid fa-user"></i></button>
        </div>
    </header>

    <main>
        <h2 id="userTag" style="margin-bottom: 20px;">Bienvenido a la biblioteca digital</h2>
        <div class="books-grid" id="grid"></div>
    </main>

    <div class="modal" id="modalPub">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalPub')">&times;</span>
            <h3>Publicar Libro</h3>
            <form id="fPub">
                <input type="text" id="pTitle" placeholder="Título del libro" required>
                <input type="url" id="pCoverUrl" placeholder="Enlace de la portada (URL)" required>
                <input type="url" id="pPdfUrl" placeholder="Enlace del PDF (Google Drive/Mega)" required>
                <p style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 10px;">*Usa enlaces públicos para que otros puedan verlos.</p>
                <button type="submit" class="btn" style="width:100%">Guardar Libro</button>
            </form>
        </div>
    </div>

    <div class="modal" id="modalAuth">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalAuth')">&times;</span>
            <h3 id="aTitle">Acceso</h3>
            <form id="fAuth">
                <input type="text" id="aName" placeholder="Tu Nombre de Escritor" style="display:none">
                <input type="email" id="aEmail" placeholder="Correo" required>
                <input type="password" id="aPass" placeholder="Contraseña" required>
                <button type="submit" class="btn" style="width:100%" id="aBtn">Entrar</button>
                <p style="text-align:center; font-size:0.8rem; margin-top:10px; cursor:pointer" onclick="toggleA()">¿No tienes cuenta? Regístrate</p>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // CONFIGURACIÓN DE FIREBASE (PEGA TUS DATOS AQUÍ)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userLog = null;
        let isReg = false;

        window.openM = (id) => document.getElementById(id).classList.add('active');
        window.closeM = (id) => document.getElementById(id).classList.remove('active');
        window.toggleA = () => {
            isReg = !isReg;
            document.getElementById('aName').style.display = isReg ? 'block' : 'none';
            document.getElementById('aTitle').innerText = isReg ? 'Crear Cuenta' : 'Iniciar Sesión';
            document.getElementById('aBtn').innerText = isReg ? 'Registrarse' : 'Entrar';
        };

        // Auth
        document.getElementById('fAuth').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('aEmail').value;
            const pass = document.getElementById('aPass').value;
            try {
                if(isReg) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: document.getElementById('aName').value });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                closeM('modalAuth');
            } catch(err) { alert(err.message); }
        };

        onAuthStateChanged(auth, (u) => {
            userLog = u;
            if(u) document.getElementById('userTag').innerText = "Hola, " + (u.displayName || "Escritor");
        });

        // Guardar Libro (Solo Firestore)
        document.getElementById('fPub').onsubmit = async (e) => {
            e.preventDefault();
            if(!userLog) return alert("Inicia sesión para publicar");

            try {
                await addDoc(collection(db, "libros"), {
                    title: document.getElementById('pTitle').value,
                    cover: document.getElementById('pCoverUrl').value,
                    pdf: document.getElementById('pPdfUrl').value,
                    author: userLog.displayName || "Anónimo",
                    date: Date.now()
                });
                closeM('modalPub');
                document.getElementById('fPub').reset();
            } catch(err) { alert("Error al guardar: " + err.message); }
        };

        // Escuchar Libros
        onSnapshot(query(collection(db, "libros"), orderBy("date", "desc")), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `<img src="${b.cover}" class="book-cover" onerror="this.src='https://via.placeholder.com/200x250?text=Sin+Portada'">
                                 <strong>${b.title}</strong><br>
                                 <small>Por: ${b.author}</small>`;
                card.onclick = () => window.open(b.pdf, '_blank');
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
