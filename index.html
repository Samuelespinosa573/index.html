<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech - Edición con Código</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #6366f1;
            --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; margin: 0; }
        
        header { 
            height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 2rem; border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box;
        }

        .logo { font-weight: 700; font-size: 1.5rem; background: linear-gradient(to right, #818cf8, #e0e7ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        main { padding: 100px 2rem 2rem; max-width: 1200px; margin: 0 auto; }

        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; }

        .book-card { background: var(--glass); border-radius: 15px; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .edit-btn { position: absolute; top: 10px; right: 10px; background: var(--accent); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: none; }
        .book-card:hover .edit-btn { display: block; }

        .book-cover { width: 100%; height: 260px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #1e293b; }

        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 200; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 20px; width: 100%; max-width: 450px; position: relative; }

        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; box-sizing: border-box; }
        
        .close { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-book"></i> Bibliotech</div>
        <button class="btn" onclick="openForm()"><i class="fa-solid fa-plus"></i> Publicar Libro</button>
    </header>

    <main>
        <div class="books-grid" id="grid"></div>
    </main>

    <div class="modal" id="modalBook">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalBook')">&times;</span>
            <h3 id="formTitle">Publicar Nuevo Libro</h3>
            <form id="fBook">
                <input type="hidden" id="editId">
                <input type="text" id="pTitle" placeholder="Título del libro" required>
                <input type="text" id="pAuthor" placeholder="Nombre del escritor" required>
                <input type="url" id="pCover" placeholder="URL de la portada" required>
                <input type="url" id="pPdf" placeholder="URL del PDF" required>
                <input type="password" id="pCode" placeholder="Crea un código de seguridad para este libro" required>
                <p id="editNote" style="font-size: 0.7rem; color: #94a3b8; display:none;">*Para editar, ingresa el código original que creaste.</p>
                <button type="submit" class="btn" style="width:100%; margin-top:10px;" id="submitBtn">Guardar Libro</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Configuración basada en tus capturas
        const firebaseConfig = {
            apiKey: "AIzaSyAocuJ_tFSsKKqKXtggvrrZgWDAPqt2uek",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "libros");

        window.closeM = (id) => document.getElementById(id).classList.remove('active');

        // Abrir formulario para publicar
        window.openForm = () => {
            document.getElementById('fBook').reset();
            document.getElementById('editId').value = "";
            document.getElementById('formTitle').innerText = "Publicar Nuevo Libro";
            document.getElementById('editNote').style.display = "none";
            document.getElementById('pCode').placeholder = "Crea un código de seguridad";
            document.getElementById('modalBook').classList.add('active');
        };

        // Guardar o Actualizar
        document.getElementById('fBook').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const codeInput = document.getElementById('pCode').value;
            
            const data = {
                title: document.getElementById('pTitle').value,
                author: document.getElementById('pAuthor').value,
                cover: document.getElementById('pCover').value,
                pdf: document.getElementById('pPdf').value,
                code: codeInput,
                updatedAt: Date.now()
            };

            try {
                if (id) {
                    // Lógica de edición: Verificar código
                    const bookDoc = document.getElementById(`data-${id}`);
                    const originalCode = bookDoc.getAttribute('data-code');
                    
                    if (codeInput === originalCode) {
                        await updateDoc(doc(db, "libros", id), data);
                        alert("¡Libro actualizado!");
                    } else {
                        alert("Código incorrecto. No tienes permiso para editar este libro.");
                        return;
                    }
                } else {
                    // Lógica de publicación nueva
                    await addDoc(colRef, data);
                    alert("¡Libro publicado!");
                }
                closeM('modalBook');
            } catch (err) { alert("Error: " + err.message); }
        };

        // Cargar libros y generar tarjetas
        onSnapshot(query(colRef, orderBy("updatedAt", "desc")), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            snap.forEach(docSnap => {
                const b = docSnap.data();
                const id = docSnap.id;
                
                const card = document.createElement('div');
                card.className = 'book-card';
                // Guardamos el código oculto en un atributo para la verificación
                card.id = `data-${id}`;
                card.setAttribute('data-code', b.code); 
                
                card.innerHTML = `
                    <button class="edit-btn" onclick="event.stopPropagation(); prepareEdit('${id}', '${b.title}', '${b.author}', '${b.cover}', '${b.pdf}')">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <img src="${b.cover}" class="book-cover" onerror="this.src='https://via.placeholder.com/200x260?text=Sin+Portada'">
                    <strong>${b.title}</strong><br>
                    <small>Escritor: ${b.author}</small>
                `;
                card.onclick = () => window.open(b.pdf, '_blank');
                grid.appendChild(card);
            });
        });

        // Preparar modal para editar
        window.prepareEdit = (id, title, author, cover, pdf) => {
            document.getElementById('editId').value = id;
            document.getElementById('pTitle').value = title;
            document.getElementById('pAuthor').value = author;
            document.getElementById('pCover').value = cover;
            document.getElementById('pPdf').value = pdf;
            document.getElementById('pCode').value = "";
            document.getElementById('pCode').placeholder = "Ingresa el código de seguridad";
            document.getElementById('formTitle').innerText = "Editar Libro";
            document.getElementById('editNote').style.display = "block";
            document.getElementById('modalBook').classList.add('active');
        };
    </script>
</body>
</html>
