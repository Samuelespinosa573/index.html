<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinas Bellas | Frutería Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --verde: #1b4332;
            --verde-claro: #2d6a4f;
            --amarillo: #ffca3a;
            --crema: #f8f9fa;
            --oscuro: #081c15;
            --rojo: #e63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--crema); color: var(--oscuro); overflow-x: hidden; }

        /* --- NAVEGACIÓN --- */
        nav { 
            background: var(--verde); 
            padding: 18px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .nav-logo { font-family: 'Playfair Display', serif; color: var(--amarillo); font-size: 1.5rem; font-weight: 900; }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=1200');
            background-size: cover; background-position: center;
            padding: 100px 20px; text-align: center; color: white;
            border-bottom: 6px solid var(--amarillo);
        }
        #store-logo {
            width: 150px; height: 150px; border-radius: 50%;
            object-fit: cover; background: white; border: 4px solid var(--amarillo);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; transition: 0.4s;
        }
        #store-logo:hover { transform: scale(1.05) rotate(3deg); }
        #store-name { font-family: 'Playfair Display', serif; font-size: 4.5rem; margin-top: 15px; text-shadow: 3px 3px 10px rgba(0,0,0,0.8); }

        /* --- CUADRÍCULA DE PRODUCTOS --- */
        .container { padding: 60px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        .card { 
            background: white; border-radius: 30px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.4s; 
            border: 1px solid #eee; position: relative;
        }
        .card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card-info { padding: 25px; text-align: center; }
        .card-info h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--verde); margin-bottom: 10px; }
        .price { font-size: 1.4rem; font-weight: 800; color: var(--verde-claro); margin-bottom: 20px; display: block; }

        /* --- BOTONES --- */
        button { padding: 14px 28px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-y { background: var(--amarillo); color: var(--oscuro); box-shadow: 0 5px 15px rgba(255,202,58,0.4); }
        .btn-v { background: var(--verde-claro); color: white; width: 100%; }
        .btn-v:hover { background: var(--verde); transform: scale(1.02); }

        /* --- SIDEBAR DE USUARIO --- */
        .sidebar { position: fixed; top: 0; right: -100%; width: 350px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 50px 30px; box-shadow: -10px 0 40px rgba(0,0,0,0.2); }
        .sidebar.active { right: 0; }
        .sidebar h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 15px; font-size: 1rem; }

        /* --- PANEL ADMIN (MODO JEFE) --- */
        .admin-controls { position: fixed; bottom: 0; width: 100%; background: var(--oscuro); padding: 20px; display: none; justify-content: center; gap: 20px; z-index: 1500; }
        body.admin-mode .admin-controls { display: flex; }
        [contenteditable="true"]:focus { background: #fffde7; outline: 2px dashed var(--amarillo); border-radius: 10px; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">ESPINAS BELLAS</div>
        <div style="display:flex; gap:15px;">
            <button class="btn-y" onclick="toggleSidebar()">Mi Cuenta</button>
            <button id="boss-btn" class="btn-y" style="background:white;" onclick="openBossModal()">Dueño</button>
        </div>
    </nav>

    <header>
        <div class="brand-box">
            <img src="https://via.placeholder.com/150" id="store-logo" onclick="if(isBoss) editLogo()">
            <h1 id="store-name">Espinas Bellas</h1>
            <p id="store-slogan" style="font-size: 1.5rem; opacity: 0.9; font-weight: 300;">Felicidad y frescura en tu mesa</p>
        </div>
    </header>

    <section class="container">
        <div class="grid" id="product-grid">
            </div>
    </section>

    <aside class="sidebar" id="sidebar">
        <h2>Hola</h2>
        <div id="auth-ui">
            <p id="auth-status" style="margin-bottom:20px; color:#666;"></p>
            <div id="auth-inputs">
                <input type="email" id="email" placeholder="Tu correo">
                <input type="password" id="pass" placeholder="Tu contraseña">
                <button class="btn-v" style="margin-top:15px;" onclick="authAction('login')">Entrar</button>
                <button class="btn-y" style="width:100%; margin-top:10px;" onclick="authAction('signup')">Registrarme</button>
            </div>
            <button id="logout-btn" class="btn-v" style="background:var(--rojo); display:none; margin-top:20px;" onclick="signOut()">Cerrar Sesión</button>
        </div>
        <button class="btn-y" style="width:100%; margin-top:40px; background:#f0f0f0;" onclick="toggleSidebar()">Cerrar</button>
    </aside>

    <div id="boss-modal" class="modal">
        <div style="background:white; padding:50px; border-radius:40px; text-align:center; width:90%; max-width:400px;">
            <h3 style="font-size:2rem; margin-bottom:20px;">Acceso Admin</h3>
            <input type="text" id="b-id" placeholder="ID de Dueño">
            <input type="password" id="b-pass" placeholder="Clave">
            <button class="btn-v" style="margin-top:20px;" onclick="bossLogin()">Acceder</button>
            <p onclick="closeBossModal()" style="margin-top:25px; color:var(--rojo); cursor:pointer; font-weight:800;">Volver</p>
        </div>
    </div>

    <footer class="admin-controls">
        <button class="btn-v" onclick="addProduct()" style="width:auto;">+ Añadir Fruta</button>
        <button class="btn-y" onclick="saveChanges()" style="min-width:250px;">💾 GUARDAR CAMBIOS</button>
        <button class="btn-v" style="background:var(--rojo); width:auto;" onclick="location.reload()">Salir</button>
    </footer>

    <script>
        // CONFIGURACIÓN OFICIAL INTEGRADA
        const firebaseConfig = {
            apiKey: "AIzaSyAOCuJ_tFSsKKqKXtgGvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isBoss = false;
        let bossCreds = { id: "24375245", pass: "1234", wa: "573223753362" };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openBossModal() { document.getElementById('boss-modal').style.display = 'flex'; }
        function closeBossModal() { document.getElementById('boss-modal').style.display = 'none'; }

        // --- SISTEMA DE USUARIOS ---
        function authAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Por favor completa los campos");

            if(type === 'signup') {
                auth.createUserWithEmailAndPassword(e, p)
                    .then(() => alert("¡Bienvenido a la familia!"))
                    .catch(err => alert("Error: " + err.message));
            } else {
                auth.signInWithEmailAndPassword(e, p)
                    .then(() => toggleSidebar())
                    .catch(err => alert("Datos incorrectos"));
            }
        }

        auth.onAuthStateChanged(user => {
            const inputs = document.getElementById('auth-inputs');
            const logout = document.getElementById('logout-btn');
            const status = document.getElementById('auth-status');
            if(user) {
                inputs.style.display = 'none'; logout.style.display = 'block';
                status.innerHTML = `Conectado como:<br><b>${user.email}</b>`;
            } else {
                inputs.style.display = 'block'; logout.style.display = 'none';
                status.innerText = "Inicia sesión para pedir tus frutas favoritas.";
            }
        });

        function signOut() { auth.signOut(); }

        // --- MODO ADMINISTRADOR ---
        function bossLogin() {
            if(document.getElementById('b-id').value === bossCreds.id && document.getElementById('b-pass').value === bossCreds.pass) {
                isBoss = true;
                document.body.classList.add('admin-mode');
                document.getElementById('store-name').contentEditable = true;
                document.getElementById('store-slogan').contentEditable = true;
                closeBossModal();
                alert("Modo Dueño Activado: Puedes editar todo directamente.");
            } else { alert("Acceso denegado."); }
        }

        // --- PRODUCTOS ---
        function loadProducts() {
            db.ref('productos').on('value', snap => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    grid.innerHTML += `
                        <div class="card" data-key="${child.key}">
                            <img src="${p.imagen}" onclick="if(isBoss) editImg('${child.key}')">
                            <div class="card-info">
                                <h3 contenteditable="${isBoss}" class="e-n">${p.nombre}</h3>
                                <span contenteditable="${isBoss}" class="price e-p">${p.precio}</span>
                                <button class="btn-v" onclick="order('${p.nombre}')">Comprar por WhatsApp</button>
                                ${isBoss ? `<p onclick="del('${child.key}')" style="color:red; cursor:pointer; margin-top:20px; font-weight:700;">Eliminar 🗑️</p>` : ''}
                            </div>
                        </div>
                    `;
                });
            });
        }

        function saveChanges() {
            const updates = {};
            updates['config/name'] = document.getElementById('store-name').innerText;
            updates['config/slogan'] = document.getElementById('store-slogan').innerText;
            
            document.querySelectorAll('.card').forEach(c => {
                const k = c.getAttribute('data-key');
                updates[`productos/${k}/nombre`] = c.querySelector('.e-n').innerText;
                updates[`productos/${k}/precio`] = c.querySelector('.e-p').innerText;
            });

            db.ref().update(updates).then(() => alert("¡Página actualizada con éxito! 💾"));
        }

        function order(item) {
            const user = auth.currentUser;
            if(!user) return alert("Debes iniciar sesión para realizar pedidos.");
            window.open(`https://wa.me/${bossCreds.wa}?text=Hola! Soy ${user.email}. Quiero pedir: ${item}`);
        }

        function addProduct() { db.ref('productos').push({ nombre: "Nombre Fruta", precio: "$0.000", imagen: "https://via.placeholder.com/500" }); }
        function del(k) { if(confirm("¿Seguro que quieres eliminar este producto?")) db.ref('productos/'+k).remove(); }
        function editImg(k) { const u = prompt("URL de la imagen:"); if(u) db.ref('productos/'+k+'/imagen').set(u); }
        function editLogo() { const u = prompt("URL del nuevo Logo:"); if(u) db.ref('config/logo').set(u); }

        // Cargar Datos de Configuración
        db.ref('config').on('value', snap => {
            const c = snap.val();
            if(c) {
                if(c.name) document.getElementById('store-name').innerText = c.name;
                if(c.slogan) document.getElementById('store-slogan').innerText = c.slogan;
                if(c.logo) document.getElementById('store-logo').src = c.logo;
            }
        });

        window.onload = loadProducts;
    </script>
</body>
</html>
