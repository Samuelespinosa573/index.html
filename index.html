<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinas Bellas | Frutería Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --verde: #1b4332;
            --verde-claro: #2d6a4f;
            --amarillo: #ffca3a;
            --crema: #f8f9fa;
            --oscuro: #081c15;
            --rojo: #e63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--crema); color: var(--oscuro); padding-bottom: 80px; }

        nav { 
            background: var(--verde); 
            padding: 15px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .nav-logo { 
            font-family: 'Playfair Display', serif; 
            color: var(--amarillo); 
            font-size: 1.5rem; 
            font-weight: 900; 
            text-transform: uppercase;
            outline: none;
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=1200');
            background-size: cover; background-position: center;
            padding: 100px 20px; text-align: center; color: white;
            border-bottom: 6px solid var(--amarillo);
        }
        
        #store-name { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5rem; 
            margin-top: 15px;
            display: inline-block;
            padding: 5px 15px;
        }

        /* Mejora de visibilidad al editar texto blanco */
        [contenteditable="true"]:focus {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            outline: none;
        }

        .container { padding: 40px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        
        .sidebar { 
            position: fixed; top: 0; right: -100%; width: 340px; height: 100%; 
            background: white; z-index: 5000; transition: 0.5s; padding: 40px 25px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto;
        }
        .sidebar.active { right: 0; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; }
        button { padding: 12px 25px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-y { background: var(--amarillo); color: var(--oscuro); }
        .btn-v { background: var(--verde-claro); color: white; width: 100%; }

        .admin-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--oscuro); 
            padding: 15px; display: none; justify-content: center; gap: 20px; z-index: 3000; 
        }
        body.admin-mode .admin-footer { display: flex; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 4000; }
    </style>
</head>
<body id="main-body">

    <nav>
        <div class="nav-logo" id="nav-title" contenteditable="false">ESPINAS BELLAS</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-y" onclick="toggleSidebar()">Mi Cuenta</button>
            <button class="btn-y" style="background:white;" onclick="handleBossButton()">Dueño</button>
        </div>
    </nav>

    <header>
        <img src="https://via.placeholder.com/150" id="store-logo" style="width:140px; height:140px; border-radius:50%; border:4px solid var(--amarillo); object-fit:cover; background: white;">
        <br>
        <h1 id="store-name" contenteditable="false">Espinas Bellas</h1>
        <p id="store-slogan" contenteditable="false">Calidad y Frescura en tu hogar</p>
    </header>

    <section class="container">
        <div class="grid" id="product-grid"></div>
    </section>

    <aside class="sidebar" id="sidebar">
        <h2 id="sidebar-title">Menú Lateral</h2>
        <p id="auth-status" style="margin: 10px 0; font-size: 0.9rem; color: #666;"></p>
        
        <div id="auth-container">
            <div id="login-view">
                <input type="email" id="login-email" placeholder="Correo electrónico">
                <input type="password" id="login-pass" placeholder="Contraseña">
                <button class="btn-v" onclick="signIn()">Ingresar</button>
                <hr style="margin: 20px 0;">
                <p style="text-align:center; font-size: 0.8rem;">¿No tienes cuenta?</p>
                <button class="btn-y" style="width:100%; margin-top:10px;" onclick="switchAuth(true)">Crear Cuenta Nueva</button>
            </div>

            <div id="register-view" style="display:none;">
                <input type="text" id="reg-name" placeholder="Nombre de Usuario completo">
                <input type="email" id="reg-email" placeholder="Correo electrónico">
                <input type="password" id="reg-pass" placeholder="Contraseña">
                <button class="btn-v" style="background: var(--amarillo); color: black;" onclick="signUp()">Registrarme</button>
                <button onclick="switchAuth(false)" style="background:none; color:grey; width:100%; margin-top:10px;">Volver al ingreso</button>
            </div>

            <button id="logout-btn" class="btn-v" style="background:var(--rojo); display:none; margin-top:20px;" onclick="signOut()">Cerrar Sesión</button>
        </div>

        <div id="admin-settings-ui" style="display: none; border-top: 2px dashed #eee; margin-top: 20px; padding-top: 15px;">
            <h3>⚙️ Configuración</h3>
            <input type="text" id="edit-logo-url" placeholder="URL del Logo (Imagen)">
            <button class="btn-v" onclick="saveLogo()">Actualizar Logo</button>
        </div>
    </aside>

    <div id="boss-modal" class="modal">
        <div style="background:white; padding:30px; border-radius:20px; text-align:center;">
            <h3>Acceso Administrativo</h3>
            <input type="text" id="b-id" placeholder="ID de Jefe">
            <input type="password" id="b-pass" placeholder="Contraseña">
            <button class="btn-v" onclick="bossLogin()">Entrar</button>
            <p onclick="closeBossModal()" style="color:red; cursor:pointer; margin-top:10px;">Cancelar</p>
        </div>
    </div>

    <footer class="admin-footer">
        <button class="btn-v" onclick="addProduct()" style="width:auto;">+ Añadir Fruta</button>
        <button class="btn-y" onclick="saveChanges()">💾 GUARDAR TODO</button>
        <button class="btn-v" style="background:var(--rojo); width:auto;" onclick="location.reload()">Salir Modo Jefe</button>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOCuJ_tFSsKKqKXtgGvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isBoss = false;
        let bossCreds = { id: "24375245", pass: "1234", wa: "3212968875" };

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openBossModal() { document.getElementById('boss-modal').style.display = 'flex'; }
        function closeBossModal() { document.getElementById('boss-modal').style.display = 'none'; }
        function handleBossButton() { isBoss ? toggleSidebar() : openBossModal(); }

        // MANEJO DE VISTAS DE USUARIO
        function switchAuth(isRegister) {
            document.getElementById('login-view').style.display = isRegister ? 'none' : 'block';
            document.getElementById('register-view').style.display = isRegister ? 'block' : 'none';
        }

        // REGISTRO CON 3 CAMPOS (NOMBRE, CORREO, CLAVE)
        function signUp() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(!name || !email || !pass) return alert("Por favor llena los 3 campos");

            auth.createUserWithEmailAndPassword(email, pass).then(res => {
                // Guardar el nombre en el perfil de Firebase
                return res.user.updateProfile({ displayName: name });
            }).then(() => {
                alert("Cuenta creada con éxito. ¡Bienvenido " + name + "!");
                location.reload();
            }).catch(e => alert("Error: " + e.message));
        }

        function signIn() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).then(() => toggleSidebar()).catch(e => alert("Datos incorrectos"));
        }

        function signOut() { auth.signOut().then(() => location.reload()); }

        // MODO JEFE
        function bossLogin() {
            if(document.getElementById('b-id').value === bossCreds.id && document.getElementById('b-pass').value === bossCreds.pass) {
                isBoss = true;
                document.body.classList.add('admin-mode');
                document.getElementById('admin-settings-ui').style.display = 'block';
                document.getElementById('nav-title').contentEditable = true;
                document.getElementById('store-name').contentEditable = true;
                document.getElementById('store-slogan').contentEditable = true;
                closeBossModal();
                loadProducts();
            } else { alert("Acceso denegado"); }
        }

        function loadProducts() {
            db.ref('productos').on('value', snap => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    grid.innerHTML += `
                        <div class="card" data-key="${child.key}">
                            <img src="${p.imagen}" style="width:100%; height:200px; object-fit:cover;">
                            <div style="padding:15px;">
                                <h3 contenteditable="${isBoss}" class="e-n">${p.nombre}</h3>
                                <p contenteditable="${isBoss}" class="e-p" style="color:var(--verde-claro); font-weight:800;">${p.precio}</p>
                                <button class="btn-v" onclick="order('${p.nombre}')">Pedir por WhatsApp</button>
                                ${isBoss ? `<p onclick="del('${child.key}')" style="color:red; cursor:pointer; margin-top:10px; font-size:0.8rem;">Eliminar</p>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        function saveChanges() {
            const updates = {};
            updates['config/nav_title'] = document.getElementById('nav-title').innerText;
            updates['config/name'] = document.getElementById('store-name').innerText;
            updates['config/slogan'] = document.getElementById('store-slogan').innerText;
            
            document.querySelectorAll('.card').forEach(c => {
                const k = c.getAttribute('data-key');
                updates[`productos/${k}/nombre`] = c.querySelector('.e-n').innerText;
                updates[`productos/${k}/precio`] = c.querySelector('.e-p').innerText;
            });
            db.ref().update(updates).then(() => alert("¡Todo guardado en la nube!"));
        }

        function saveLogo() {
            const url = document.getElementById('edit-logo-url').value;
            if(url) db.ref('config/logo').set(url).then(() => alert("Logo actualizado"));
        }

        function order(item) {
            const user = auth.currentUser;
            const cliente = user ? (user.displayName || user.email) : "Cliente Nuevo";
            window.open(`https://wa.me/${bossCreds.wa}?text=Hola, soy ${cliente}. Quiero pedir: ${item}`);
        }

        function addProduct() { db.ref('productos').push({ nombre: "Nueva Fruta", precio: "$0.00", imagen: "https://via.placeholder.com/300" }); }
        function del(k) { if(confirm("¿Borrar fruta?")) db.ref('productos/'+k).remove(); }

        // LISTENER DE DATOS Y USUARIO
        auth.onAuthStateChanged(user => {
            const status = document.getElementById('auth-status');
            const loginView = document.getElementById('login-view');
            const logoutBtn = document.getElementById('logout-btn');

            if(user) {
                status.innerText = "Conectado como: " + (user.displayName || user.email);
                loginView.style.display = 'none';
                document.getElementById('register-view').style.display = 'none';
                logoutBtn.style.display = 'block';
            } else {
                status.innerText = "Inicia sesión para pedir";
                loginView.style.display = 'block';
                logoutBtn.style.display = 'none';
            }
        });

        db.ref('config').on('value', snap => {
            const c = snap.val();
            if(c) {
                if(c.nav_title) document.getElementById('nav-title').innerText = c.nav_title;
                if(c.name) document.getElementById('store-name').innerText = c.name;
                if(c.slogan) document.getElementById('store-slogan').innerText = c.slogan;
                if(c.logo) {
                    document.getElementById('store-logo').src = c.logo;
                    document.getElementById('edit-logo-url').value = c.logo;
                }
            }
        });

        window.onload = loadProducts;
    </script>
</body>
</html>
