<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutería Las Espinas Bellas - v8 Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primario: #2d6a4f; --secundario: #ffca3a; --peligro: #ff4757; --fondo: #f4f7f6; --blanco: #ffffff; }
        
        body { font-family: 'Outfit', sans-serif; background-color: var(--fondo); margin: 0; padding-bottom: 100px; }

        /* HEADER Y NAV */
        nav { background: var(--primario); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-nav { color: white; font-weight: 700; font-size: 1.3rem; }
        
        header { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?q=80&w=2000'); background-size: cover; text-align: center; padding: 60px 20px; color: white; }
        header img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--secundario); background: white; margin-bottom: 10px; }

        /* CATALOGO */
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; padding: 30px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; border: 1px solid #eee; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-body h3 { margin: 10px 0; font-size: 1.2rem; color: var(--primario); }
        .card-body p { font-weight: 600; color: #666; }

        /* BOTONES */
        .btn { border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-family: 'Outfit'; }
        .btn-pedir { background: #25d366; color: white; text-decoration: none; display: block; margin-top: 10px; transition: 0.2s; }
        .btn-pedir:hover { background: #1eb956; }
        .btn-acc { background: var(--secundario); color: #333; }

        /* RESEÑAS FLOTANTES */
        #review-box { position: fixed; bottom: 95px; right: 25px; width: 300px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 2px solid var(--primario); z-index: 900; overflow: hidden; display: none; }
        .rev-header { background: var(--primario); color: white; padding: 12px; font-weight: 700; display: flex; justify-content: space-between; }
        #rev-list { max-height: 180px; overflow-y: auto; padding: 15px; font-size: 0.9rem; }
        .rev-item { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--secundario); }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-card { background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; }
        .modal-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }

        /* ADMIN BAR */
        #admin-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 15px; display: none; justify-content: space-around; align-items: center; z-index: 1500; border-top: 3px solid var(--secundario); }

        #toast { position: fixed; top: 20px; right: 20px; background: #333; color: white; padding: 15px 25px; border-radius: 10px; display: none; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <nav>
        <div class="logo-nav">Espinas Bellas</div>
        <div id="user-area">
            <button class="btn btn-acc" onclick="openModal('modal-login')">Entrar al Sistema</button>
        </div>
    </nav>

    <header>
        <img id="main-logo" src="https://cdn-icons-png.flaticon.com/512/1625/1625048.png">
        <h1 id="view-name">Cargando Tienda...</h1>
        <p id="view-slogan">Sincronizando con la nube...</p>
    </header>

    <div class="catalog" id="catalog"></div>

    <button onclick="toggleReviews()" style="position:fixed; bottom:110px; right:25px; background:var(--primario); color:white; border:none; border-radius:50px; padding:12px 25px; font-weight:700; cursor:pointer; z-index:800; box-shadow:0 5px 15px rgba(0,0,0,0.2)">Ver Opiniones</button>
    
    <div id="review-box">
        <div class="rev-header">Opiniones <span onclick="toggleReviews()" style="cursor:pointer">✕</span></div>
        <div id="rev-list"></div>
        <div style="padding:10px; border-top:1px solid #eee">
            <input type="text" id="rev-input" placeholder="Escribe tu reseña..." style="width:75%; padding:8px; border-radius:5px; border:1px solid #ccc">
            <button onclick="addReview()" style="width:20%; background:var(--primario); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer">↑</button>
        </div>
    </div>

    <div id="modal-login" class="modal-overlay">
        <div class="modal-card">
            <h2>Acceso Seguro</h2>
            <p style="font-size:0.85rem; color:#777">Usa tu código de 8 dígitos para el Modo Dueño</p>
            <input type="text" id="login-id" placeholder="Código o Usuario">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button class="btn btn-acc" style="width:100%" onclick="handleLogin()">Entrar</button>
            <button onclick="closeModal('modal-login')" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer">Cancelar</button>
        </div>
    </div>

    <div id="admin-bar">
        <input type="text" id="cfg-wa" placeholder="WhatsApp (ej: 57...)" style="padding:8px; border-radius:5px; width:120px">
        <button class="btn" style="background:#4caf50; color:white" onclick="addNewProduct()">+ Fruta</button>
        <button class="btn" style="background:#2196f3; color:white" onclick="pushToCloud()">💾 GUARDAR CAMBIOS</button>
        <button class="btn" style="background:var(--peligro); color:white" onclick="exitBoss()">Salir</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOcuj_tFSsKKqKXtggvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com/",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // DATOS MAESTROS DE RECUPERACIÓN (Si la base de datos está vacía)
        const initialData = {
            config: {
                nombre: "Frutería Las Espinas Bellas",
                lema: "Las mejores frutas de la región",
                whatsapp: "573223753362",
                bossId: "24375245",
                bossPass: "sarita12"
            },
            productos: [
                { nombre: "Uvas", precio: "$6.000 / 500g", imagen: "https://images.unsplash.com/photo-1537084642907-629340c7e59c?q=80&w=500" },
                { nombre: "Manzana Roja", precio: "$2.500 / Unidad", imagen: "https://images.unsplash.com/photo-1560806887-1e4cd0b6bccb?q=80&w=500" }
            ],
            resenas: [ { user: "Sistema", texto: "¡Bienvenidos a nuestra nueva tienda!" } ]
        };

        let localData = initialData;
        let isBoss = localStorage.getItem('isBoss') === 'true';

        // 1. ESCUCHA DE DATOS (Con reparación automática)
        db.ref('/').on('value', snap => {
            const cloudData = snap.val();
            if (cloudData && cloudData.config) {
                localData = cloudData;
            } else {
                // Si la nube está null o vacía, mandamos los datos iniciales
                pushToCloud();
            }
            render();
        });

        function handleLogin() {
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if (id === localData.config.bossId && pass === localData.config.bossPass) {
                isBoss = true;
                localStorage.setItem('isBoss', 'true');
                document.getElementById('admin-bar').style.display = 'flex';
                closeModal('modal-login');
                showToast("🔓 Modo Dueño Activo");
                render();
            } else {
                showToast("❌ Código o clave incorrecta");
            }
        }

        function render() {
            document.getElementById('view-name').innerText = localData.config.nombre;
            document.getElementById('view-slogan').innerText = localData.config.lema;
            document.getElementById('cfg-wa').value = localData.config.whatsapp;

            // Render Productos
            const cat = document.getElementById('catalog');
            cat.innerHTML = '';
            (localData.productos || []).forEach((p, i) => {
                cat.innerHTML += `
                    <div class="card">
                        <img src="${p.imagen}" onclick="changeImg(${i})">
                        <div class="card-body">
                            <h3 contenteditable="${isBoss}" oninput="localData.productos[${i}].nombre=this.innerText">${p.nombre}</h3>
                            <p contenteditable="${isBoss}" oninput="localData.productos[${i}].precio=this.innerText">${p.precio}</p>
                            ${isBoss ? 
                                `<button onclick="delP(${i})" style="color:red; background:none; border:none; cursor:pointer">Eliminar</button>` : 
                                `<a href="https://wa.me/${localData.config.whatsapp}?text=Hola, quiero ${p.nombre}" target="_blank" class="btn btn-pedir">Pedir</a>`
                            }
                        </div>
                    </div>`;
            });

            // Render Reseñas
            const rList = document.getElementById('rev-list');
            rList.innerHTML = '';
            (localData.resenas || []).forEach(r => {
                rList.innerHTML += `<div class="rev-item"><strong>${r.user}:</strong> ${r.texto}</div>`;
            });
        }

        function pushToCloud() {
            localData.config.whatsapp = document.getElementById('cfg-wa').value || localData.config.whatsapp;
            db.ref('/').set(localData).then(() => showToast("✅ Datos sincronizados"));
        }

        function addNewProduct() {
            localData.productos.push({ nombre: "Nueva Fruta", precio: "$0.00", imagen: "https://via.placeholder.com/300" });
            render();
        }

        function delP(i) { if(confirm("¿Borrar?")) { localData.productos.splice(i,1); render(); } }

        function changeImg(i) {
            if(isBoss) {
                const url = prompt("Pega la URL de la imagen:", localData.productos[i].imagen);
                if(url) { localData.productos[i].imagen = url; render(); }
            }
        }

        function addReview() {
            const txt = document.getElementById('rev-input').value;
            if(txt) {
                if(!localData.resenas) localData.resenas = [];
                localData.resenas.push({ user: isBoss ? "Dueño" : "Cliente", texto: txt });
                document.getElementById('rev-input').value = '';
                pushToCloud();
            }
        }

        function exitBoss() { isBoss = false; localStorage.clear(); location.reload(); }
        function toggleReviews() { const b = document.getElementById('review-box'); b.style.display = b.style.display === 'block' ? 'none' : 'block'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
    </script>
</body>
</html>
