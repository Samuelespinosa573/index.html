<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutería Las Espinas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f4f4; padding-bottom: 80px; }
        header { background: #2d6a4f; color: white; padding: 40px; text-align: center; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 5px; }
        .admin-btn { position: fixed; top: 10px; right: 10px; z-index: 100; padding: 10px; background: #ffca3a; border: none; cursor: pointer; }
        .save-bar { position: fixed; bottom: 0; width: 100%; background: #ffca3a; padding: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

    <button class="admin-btn" onclick="entrar()">Modo Dueño</button>

    <header>
        <h1 id="n-negocio">Cargando...</h1>
        <p id="l-negocio">Cargando...</p>
    </header>

    <div class="catalog" id="contenedor"></div>

    <div class="save-bar" id="barra-guardar">
        <button onclick="guardar()">💾 GUARDAR CAMBIOS</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOcuj_tFSsKKqKXtggvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com/",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let editando = false;
        let misProductos = [];
        let miConfig = {};

        db.ref('/').on('value', (snap) => {
            const data = snap.val();
            if (data) {
                misProductos = data.productos || [];
                miConfig = data.config || { nombre: "Frutería", lema: "Frutas frescas" };
                dibujar();
            }
        });

        function dibujar() {
            document.getElementById('n-negocio').innerText = miConfig.nombre;
            document.getElementById('l-negocio').innerText = miConfig.lema;
            const caja = document.getElementById('contenedor');
            caja.innerHTML = '';

            misProductos.forEach((p, i) => {
                caja.innerHTML += `
                    <div class="card">
                        <img src="${p.imagen}">
                        <h3 contenteditable="${editando}" oninput="misProductos[${i}].nombre=this.innerText">${p.nombre}</h3>
                        <p contenteditable="${editando}" oninput="misProductos[${i}].precio=this.innerText">${p.precio}</p>
                    </div>`;
            });

            if(editando) {
                caja.innerHTML += `<div onclick="nuevo()" style="border:2px dashed #333; padding:20px; cursor:pointer;">+ Añadir</div>`;
            }
        }

        function entrar() {
            let clave = prompt("Clave:");
            if(clave === "1234") {
                editando = true;
                document.getElementById('barra-guardar').style.display = 'block';
                document.getElementById('n-negocio').contentEditable = true;
                document.getElementById('l-negocio').contentEditable = true;
                dibujar();
            }
        }

        function nuevo() {
            misProductos.push({ nombre: "Nueva Fruta", precio: "$0", imagen: "https://via.placeholder.com/150" });
            dibujar();
        }

        function guardar() {
            miConfig.nombre = document.getElementById('n-negocio').innerText;
            miConfig.lema = document.getElementById('l-negocio').innerText;
            db.ref('/').set({ productos: misProductos, config: miConfig })
                .then(() => alert("¡Guardado en la nube!"));
        }
    </script>
</body>
</html>
