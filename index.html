<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech - Sistema de Reseñas</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); --accent: #6366f1; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; margin: 0; }
        header { height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box; }
        .logo { font-weight: 700; font-size: 1.5rem; background: linear-gradient(to right, #818cf8, #e0e7ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        main { padding: 100px 2rem 2rem; max-width: 1200px; margin: 0 auto; }
        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; }
        .book-card { background: var(--glass); border-radius: 15px; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .book-cover { width: 100%; height: 260px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; background: #1e293b; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; }
        
        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 200; padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 20px; width: 100%; max-width: 600px; position: relative; margin-top: auto; margin-bottom: auto; }
        .close { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; z-index: 10; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; box-sizing: border-box; }
        
        /* Estilos Reseñas */
        .reviews-section { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .review-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; position: relative; }
        .stars { color: #fbbf24; }
        .vote-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        .pos { background: #22c55e33; color: #4ade80; }
        .neg { background: #ef444433; color: #f87171; }
        .stats-bar { display: flex; gap: 20px; margin-bottom: 20px; background: var(--glass); padding: 15px; border-radius: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-book"></i> Bibliotech</div>
        <button class="btn" onclick="openForm()"><i class="fa-solid fa-plus"></i> Publicar Libro</button>
    </header>

    <main>
        <div class="books-grid" id="grid"></div>
    </main>

    <div class="modal" id="modalView">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalView')">&times;</span>
            <div id="bookInfo"></div>
            
            <div class="reviews-section">
                <h4>Reseñas y Calificaciones</h4>
                <div class="stats-bar" id="stats"></div>
                
                <form id="fReview">
                    <input type="hidden" id="rBookId">
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="rUser" placeholder="Tu nombre" required>
                        <select id="rStars" required>
                            <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                            <option value="4">⭐⭐⭐⭐ (4)</option>
                            <option value="3">⭐⭐⭐ (3)</option>
                            <option value="2">⭐⭐ (2)</option>
                            <option value="1">⭐ (1)</option>
                        </select>
                    </div>
                    <textarea id="rComment" placeholder="Escribe tu opinión..." rows="2" required></textarea>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="rVote" style="width: 150px;">
                            <option value="pos">👍 Positiva</option>
                            <option value="neg">👎 Negativa</option>
                        </select>
                        <input type="password" id="rCode" placeholder="Código para editar/borrar" required>
                        <button type="submit" class="btn">Enviar</button>
                    </div>
                </form>

                <div id="reviewsList" style="margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="modalBook">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalBook')">&times;</span>
            <h3 id="formTitle">Publicar Libro</h3>
            <form id="fBook">
                <input type="text" id="pTitle" placeholder="Título" required>
                <input type="text" id="pAuthor" placeholder="Escritor" required>
                <input type="url" id="pCover" placeholder="URL Portada" required>
                <input type="url" id="pPdf" placeholder="URL PDF" required>
                <input type="password" id="pCode" placeholder="Código de seguridad" required>
                <button type="submit" class="btn" style="width:100%; margin-top:10px;">Guardar</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAocuJ_tFSsKKqKXtggvrrZgWDAPqt2uek",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.openM = (id) => document.getElementById(id).classList.add('active');
        window.closeM = (id) => document.getElementById(id).classList.remove('active');
        window.openForm = () => { document.getElementById('fBook').reset(); openM('modalBook'); };

        // Publicar Libro
        document.getElementById('fBook').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "libros"), {
                title: document.getElementById('pTitle').value,
                author: document.getElementById('pAuthor').value,
                cover: document.getElementById('pCover').value,
                pdf: document.getElementById('pPdf').value,
                code: document.getElementById('pCode').value,
                date: Date.now()
            });
            closeM('modalBook');
        };

        // Mostrar Libros
        onSnapshot(query(collection(db, "libros"), orderBy("date", "desc")), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            snap.forEach(d => {
                const b = d.data();
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `<img src="${b.cover}" class="book-cover"><strong>${b.title}</strong><br><small>${b.author}</small>`;
                card.onclick = () => showBook(d.id, b);
                grid.appendChild(card);
            });
        });

        // Ver Detalle y Cargar Reseñas
        window.showBook = (id, b) => {
            document.getElementById('rBookId').value = id;
            document.getElementById('bookInfo').innerHTML = `
                <div style="display:flex; gap:20px;">
                    <img src="${b.cover}" style="width:120px; border-radius:10px;">
                    <div>
                        <h2>${b.title}</h2>
                        <p>Por: ${b.author}</p>
                        <button class="btn" onclick="window.open('${b.pdf}')">Leer PDF</button>
                    </div>
                </div>`;
            listenReviews(id);
            openM('modalView');
        };

        // Sistema de Reseñas
        document.getElementById('fReview').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "reseñas"), {
                bookId: document.getElementById('rBookId').value,
                user: document.getElementById('rUser').value,
                stars: parseInt(document.getElementById('rStars').value),
                comment: document.getElementById('rComment').value,
                vote: document.getElementById('rVote').value,
                code: document.getElementById('rCode').value,
                date: Date.now()
            });
            document.getElementById('fReview').reset();
        };

        function listenReviews(bookId) {
            const q = query(collection(db, "reseñas"), where("bookId", "==", bookId), orderBy("date", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('reviewsList');
                const stats = document.getElementById('stats');
                let totalStars = 0, count = 0;
                list.innerHTML = "";

                snap.forEach(d => {
                    const r = d.data();
                    totalStars += r.stars;
                    count++;
                    
                    const div = document.createElement('div');
                    div.className = 'review-card';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between">
                            <strong>${r.user}</strong>
                            <span class="stars">${"⭐".repeat(r.stars)}</span>
                        </div>
                        <p>${r.comment} <span class="vote-badge ${r.vote}">${r.vote == 'pos' ? '👍' : '👎'}</span></p>
                        <button onclick="deleteR('${d.id}', '${r.code}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:0.7rem">Eliminar</button>
                    `;
                    list.appendChild(div);
                });

                const avg = count > 0 ? (totalStars / count).toFixed(1) : 0;
                stats.innerHTML = `
                    <div><strong>Promedio:</strong> ⭐ ${avg}</div>
                    <div><strong>Total:</strong> ${count} reseñas</div>
                `;
            });
        }

        window.deleteR = async (id, originalCode) => {
            const pass = prompt("Ingresa el código de esta reseña para eliminarla:");
            if(pass === originalCode) {
                await deleteDoc(doc(db, "reseñas", id));
                alert("Reseña eliminada");
            } else {
                alert("Código incorrecto");
            }
        };
    </script>
</body>
</html>
