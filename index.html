<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinas Bellas | Tienda Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --verde-premium: #1b4332;
            --dorado: #d4af37;
            --blanco: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background-color: #f9f9f9; 
            color: #333;
        }

        /* HEADER CENTRALIZADO */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1490818387583-1baba5e638af?auto=format&fit=crop&w=1300&q=80');
            background-size: cover;
            background-position: center;
            padding: 60px 20px;
            text-align: center;
            color: var(--blanco);
        }

        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #store-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--dorado);
            object-fit: cover;
            background: white;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        #store-name {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .slogan {
            font-weight: 300;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* CUADRÍCULA DE PRODUCTOS */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 50px 8%;
            margin-bottom: 100px;
        }

        .card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
            position: relative;
        }

        .card:hover { transform: translateY(-10px); }

        .card img { width: 100%; height: 220px; object-fit: cover; }

        .card-body { padding: 20px; text-align: center; }

        .card h3 { margin: 10px 0; font-size: 1.4rem; color: var(--verde-premium); }

        /* BARRA DE HERRAMIENTAS (MODO JEFE) */
        .admin-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 2000;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save { background: #3a86ff; color: white; }
        .btn-add { background: #2d6a4f; color: white; }
        .btn-exit { background: #ff595e; color: white; }

        [contenteditable="true"]:focus {
            outline: 2px solid var(--dorado);
            background: rgba(212, 175, 55, 0.1);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <img src="https://via.placeholder.com/150" id="store-logo" onclick="editLogo()" title="Click para cambiar logo">
            <h1 id="store-name" contenteditable="true">Espinas Bellas</h1>
            <p class="slogan" id="store-slogan" contenteditable="true">Calidad en cada bocado</p>
        </div>
    </header>

    <main class="grid" id="product-grid"></main>

    <div class="admin-bar" id="admin-controls">
        <input type="text" id="wa-num" placeholder="WhatsApp: 57322..." style="padding:10px; border-radius:10px;">
        <button class="btn-add" onclick="createNewProduct()">+ Fruta</button>
        <button class="btn-save" onclick="syncAllData()">💾 GUARDAR CAMBIOS</button>
        <button class="btn-exit" onclick="location.reload()">Salir</button>
    </div>

    <script>
        // Configuración de Firebase - REEMPLAZAR CON TUS DATOS REALES
        const firebaseConfig = {
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Cargar datos inicialmente
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            if(data.config) {
                document.getElementById('store-name').innerText = data.config.name || "Espinas Bellas";
                document.getElementById('store-slogan').innerText = data.config.slogan || "Calidad en cada bocado";
                document.getElementById('store-logo').src = data.config.logo || "https://via.placeholder.com/150";
                document.getElementById('wa-num').value = data.config.whatsapp || "";
            }
            renderProducts(data.productos);
        });

        function renderProducts(productos) {
            const container = document.getElementById('product-grid');
            container.innerHTML = "";
            for(let key in productos) {
                const p = productos[key];
                container.innerHTML += `
                    <div class="card" id="card-${key}">
                        <img src="${p.imagen}" onclick="editProductImg('${key}')">
                        <div class="card-body">
                            <h3 contenteditable="true" class="p-name">${p.nombre}</h3>
                            <p contenteditable="true" class="p-price">${p.precio}</p>
                            <button onclick="deleteProduct('${key}')" style="color:red; background:none; font-size:0.8rem;">Eliminar</button>
                        </div>
                    </div>
                `;
            }
        }

        // 2. FUNCIÓN DE GUARDADO CORREGIDA
        function syncAllData() {
            const updates = {};
            
            // Guardar Configuración General
            updates['config/name'] = document.getElementById('store-name').innerText;
            updates['config/slogan'] = document.getElementById('store-slogan').innerText;
            updates['config/whatsapp'] = document.getElementById('wa-num').value;
            updates['config/logo'] = document.getElementById('store-logo').src;

            // Guardar Productos (Recorrer las tarjetas)
            document.querySelectorAll('.card').forEach(card => {
                const id = card.id.replace('card-', '');
                updates[`productos/${id}/nombre`] = card.querySelector('.p-name').innerText;
                updates[`productos/${id}/precio`] = card.querySelector('.p-price').innerText;
                // La imagen se actualiza individualmente o se puede extraer del src
                updates[`productos/${id}/imagen`] = card.querySelector('img').src;
            });

            db.ref().update(updates)
                .then(() => alert("¡Todo se guardó correctamente en Firebase! ✅"))
                .catch(err => alert("Error al guardar: " + err.message));
        }

        // Funciones auxiliares
        function editLogo() {
            const url = prompt("Pega la URL de la nueva imagen del logo:");
            if(url) document.getElementById('store-logo').src = url;
        }

        function editProductImg(id) {
            const url = prompt("Nueva URL de imagen para este producto:");
            if(url) document.querySelector(`#card-${id} img`).src = url;
        }

        function createNewProduct() {
            const newKey = db.ref('productos').push().key;
            const item = { nombre: "Nueva Fruta", precio: "$0.000", imagen: "https://via.placeholder.com/400" };
            db.ref('productos/' + newKey).set(item);
        }

        function deleteProduct(id) {
            if(confirm("¿Eliminar este producto?")) db.ref('productos/' + id).remove();
        }
    </script>
</body>
</html>
