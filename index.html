<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutería Las Espinas Bellas - Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primario: #2d6a4f;
            --secundario: #ffca3a;
            --peligro: #ff4757;
            --fondo: #f4f7f6;
            --oscuro: #1a1a1a;
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--fondo); margin: 0; padding-bottom: 100px; transition: 0.3s; }

        /* NAVEGACIÓN */
        nav {
            background: var(--primario);
            padding: 12px 25px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .user-nav-profile { display: flex; align-items: center; gap: 12px; color: white; cursor: pointer; position: relative; }
        .user-nav-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--secundario); background: white; object-fit: cover; }

        .dropdown-content {
            display: none; position: absolute; top: 55px; right: 0; background: white;
            min-width: 180px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden;
        }
        .dropdown-content button { width: 100%; padding: 12px; border: none; background: none; text-align: left; cursor: pointer; font-family: 'Outfit'; }
        .dropdown-content button:hover { background: #f5f5f5; }

        /* HEADER */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?q=80&w=2000');
            background-size: cover; background-position: center; text-align: center; padding: 60px 20px; color: white;
        }
        #web-logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--secundario); cursor: pointer; object-fit: cover; }

        /* CATÁLOGO */
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; padding: 40px 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 18px; overflow: hidden; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
        .modal-card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }

        /* BARRA ADMIN */
        #admin-bar { position: fixed; bottom: 0; width: 100%; background: var(--oscuro); color: white; padding: 15px; display: none; justify-content: space-around; align-items: center; z-index: 1500; }
        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 10px; }
        .menu-icon span { width: 28px; height: 3px; background: white; border-radius: 2px; }

        .admin-sidebar { position: fixed; bottom: 80px; left: 20px; background: white; color: #333; width: 280px; border-radius: 15px; box-shadow: 0 -5px 25px rgba(0,0,0,0.3); display: none; flex-direction: column; padding: 20px; z-index: 1600; }

        /* BOTONES */
        .btn { border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-acc { background: var(--secundario); color: #333; }
        .btn-pedir { background: #25d366; color: white; text-decoration: none; display: block; margin-top: 10px; border-radius: 8px; padding: 10px; }
        
        #toast { position: fixed; top: 25px; right: 25px; background: var(--oscuro); color: white; padding: 15px 25px; border-radius: 12px; display: none; z-index: 3000; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="toast">Notificación</div>

    <nav>
        <div style="color: white; font-weight: 700; font-size: 1.4rem;">Espinas Bellas</div>
        <div id="auth-buttons">
            <button class="btn btn-acc" onclick="openModal('modal-login')">Acceder</button>
        </div>
        <div id="user-info" class="hidden">
            <div class="user-nav-profile" onclick="toggleDrop()">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <span id="nav-username">Usuario</span>
                <div class="dropdown-content" id="user-drop">
                    <button onclick="logout()" style="color: var(--peligro);">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </nav>

    <header>
        <img id="web-logo" src="https://via.placeholder.com/150" onclick="changeLogo()">
        <h1 id="biz-name">Frutería Las Espinas Bellas</h1>
        <p id="biz-slogan">Frescura que enamora</p>
    </header>

    <div class="catalog" id="catalog"></div>

    <div id="modal-login" class="modal-overlay">
        <div class="modal-card">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="login-id" placeholder="Usuario o Correo">
            <input type="password" id="login-pass" placeholder="Contraseña">
            <button class="btn btn-acc" style="width: 100%;" onclick="loginAll()">Entrar</button>
            <button onclick="closeModal('modal-login')" style="color:red; background:none; border:none; margin-top:10px; cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <div id="admin-sidebar" class="admin-sidebar">
        <h4>⚙️ Panel del Jefe</h4>
        <label>WhatsApp de Envíos:</label>
        <input type="text" id="cfg-whatsapp">
        <hr>
        <label>Nuevo Usuario/Correo:</label>
        <input type="text" id="new-boss-id" placeholder="espinas bellas">
        <label>Nueva Contraseña:</label>
        <input type="password" id="new-boss-pass" placeholder="Nueva clave">
        <button class="btn btn-acc" style="width:100%; margin-top:10px;" onclick="updateBossSettings()">Guardar Seguridad</button>
        <button class="btn" style="width:100%; margin-top:5px; background:#eee;" onclick="toggleSidebar()">Cerrar Menú</button>
    </div>

    <div id="admin-bar">
        <div class="menu-icon" onclick="toggleSidebar()">
            <span></span><span></span><span></span>
        </div>
        <button class="btn btn-acc" onclick="addProduct()">+ Producto</button>
        <button class="btn" style="background: var(--primario); color:white;" onclick="saveCloud()">💾 GUARDAR CAMBIOS</button>
        <button class="btn" style="background: var(--peligro); color:white;" onclick="exitBoss()">Salir</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOcuj_tFSsKKqKXtggvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com/",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // VALORES INICIALES SOLICITADOS
        let data = { 
            productos: [], 
            config: { 
                bossEmail: "espinas bellas", 
                bossPass: "sarita 12", 
                whatsapp: "573223753362", 
                logo: "https://via.placeholder.com/150", 
                nombre: "Frutería Las Espinas Bellas", 
                lema: "Frescura que enamora" 
            }
        };
        
        let currentUser = localStorage.getItem('user') || null;
        let isBoss = localStorage.getItem('isBoss') === 'true';

        // Escuchar cambios de la nube
        db.ref('/').on('value', snap => {
            if(snap.exists()) {
                data = snap.val();
                render();
                if(currentUser) updateUI();
            }
        });

        function loginAll() {
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            // Validación Modo Jefe
            if(id === data.config.bossEmail && pass === data.config.bossPass) {
                isBoss = true; currentUser = "Jefe Samuel";
                localStorage.setItem('user', 'Jefe Samuel');
                localStorage.setItem('isBoss', 'true');
                showToast("🔓 Acceso concedido, Jefe");
                updateUI(); closeModal('modal-login'); render();
                return;
            }

            // Validación Clientes (Firebase)
            const safePath = id.replace(/\./g, '_');
            db.ref('users/' + safePath).once('value', snap => {
                const ud = snap.val();
                if(ud && ud.pass === pass) {
                    currentUser = ud.name;
                    localStorage.setItem('user', ud.name);
                    localStorage.setItem('isBoss', 'false');
                    showToast("👋 Bienvenido " + ud.name);
                    updateUI(); closeModal('modal-login');
                } else { showToast("❌ Credenciales inválidas"); }
            });
        }

        function render() {
            document.getElementById('biz-name').innerText = data.config.nombre;
            document.getElementById('biz-slogan').innerText = data.config.lema;
            document.getElementById('cfg-whatsapp').value = data.config.whatsapp;
            document.getElementById('web-logo').src = data.config.logo;

            const cat = document.getElementById('catalog');
            cat.innerHTML = '';
            (data.productos || []).forEach((p, i) => {
                cat.innerHTML += `
                    <div class="card">
                        <img src="${p.imagen}">
                        <div class="card-body">
                            <h3 contenteditable="${isBoss}" oninput="data.productos[${i}].nombre=this.innerText">${p.nombre}</h3>
                            <p contenteditable="${isBoss}" oninput="data.productos[${i}].precio=this.innerText">${p.precio}</p>
                            ${isBoss ? 
                                `<button onclick="delP(${i})" style="color:red; background:none; border:none; cursor:pointer;">[ Eliminar ]</button>` : 
                                `<a href="https://wa.me/${data.config.whatsapp}?text=Me interesa: ${p.nombre}" target="_blank" class="btn btn-pedir">Pedir Producto</a>`
                            }
                        </div>
                    </div>`;
            });
        }

        function updateBossSettings() {
            const newId = document.getElementById('new-boss-id').value.trim();
            const newPass = document.getElementById('new-boss-pass').value.trim();

            if(newId) data.config.bossEmail = newId;
            if(newPass) data.config.bossPass = newPass;
            data.config.whatsapp = document.getElementById('cfg-whatsapp').value;

            showToast("✅ Seguridad actualizada");
            toggleSidebar();
        }

        function saveCloud() {
            db.ref('/').set(data).then(() => showToast("📁 Nube actualizada con éxito ✅"));
        }

        function addProduct() {
            if(!data.productos) data.productos = [];
            data.productos.push({ nombre: "Nuevo Item", precio: "$0.00", imagen: "https://via.placeholder.com/300" });
            render();
        }

        function delP(i) { if(confirm("¿Borrar?")) { data.productos.splice(i, 1); render(); } }

        function updateUI() {
            document.getElementById('auth-buttons').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('nav-username').innerText = currentUser;
            if(isBoss) document.getElementById('admin-bar').style.display = 'flex';
        }

        function logout() { localStorage.clear(); location.reload(); }
        function exitBoss() { isBoss = false; localStorage.setItem('isBoss', 'false'); document.getElementById('admin-bar').style.display = 'none'; render(); }
        function toggleSidebar() { const s = document.getElementById('admin-sidebar'); s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleDrop() { const d = document.getElementById('user-drop'); d.style.display = (d.style.display === 'block') ? 'none' : 'block'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function changeLogo() { if(isBoss) { const l = prompt("URL de la imagen del logo:"); if(l) { data.config.logo = l; render(); } } }
    </script>
</body>
</html>
