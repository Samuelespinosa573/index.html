<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliotech - Biblioteca Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #6366f1;
            --text: #f8fafc;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        header { 
            height: 70px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 2rem; border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed; top: 0; width: 100%; z-index: 100; box-sizing: border-box;
        }

        .logo { font-weight: 700; font-size: 1.5rem; background: linear-gradient(to right, #818cf8, #e0e7ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        main { padding: 100px 2rem 2rem; max-width: 1200px; margin: 0 auto; }

        .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; margin-top: 20px; }

        .book-card { background: var(--glass); border-radius: 15px; padding: 1rem; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(255,255,255,0.08); }

        .book-cover { width: 100%; height: 260px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; background: #1e293b; }

        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 200; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 2rem; border-radius: 24px; width: 100%; max-width: 450px; position: relative; border: 1px solid rgba(255,255,255,0.1); }

        input { width: 100%; padding: 14px; margin: 10px 0; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        input:focus { border-color: var(--accent); outline: none; }

        .close { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; color: #94a3b8; }
        .close:hover { color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-book-bookmark"></i> Bibliotech</div>
        <div>
            <button class="btn" onclick="openM('modalPub')"><i class="fa-solid fa-plus"></i> Publicar</button>
            <button class="btn" style="background: #334155; margin-left: 10px;" onclick="openM('modalAuth')"><i class="fa-solid fa-user"></i></button>
        </div>
    </header>

    <main>
        <h2 id="userTag">Bienvenido a la biblioteca digital</h2>
        <div class="books-grid" id="grid"></div>
    </main>

    <div class="modal" id="modalPub">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalPub')">&times;</span>
            <h3>Subir nuevo libro</h3>
            <form id="fPub">
                <input type="text" id="pTitle" placeholder="Título del libro" required>
                <input type="url" id="pCover" placeholder="URL de la imagen de portada" required>
                <input type="url" id="pPdf" placeholder="URL del archivo PDF (Drive/Mega)" required>
                <button type="submit" class="btn" style="width:100%; margin-top: 10px;">Publicar ahora</button>
            </form>
        </div>
    </div>

    <div class="modal" id="modalAuth">
        <div class="modal-content">
            <span class="close" onclick="closeM('modalAuth')">&times;</span>
            <h3 id="aTitle">Iniciar Sesión</h3>
            <form id="fAuth">
                <input type="text" id="aName" placeholder="Nombre de usuario" style="display:none">
                <input type="email" id="aEmail" placeholder="Correo electrónico" required>
                <input type="password" id="aPass" placeholder="Contraseña" required>
                <button type="submit" class="btn" style="width:100%; margin-top: 10px;" id="aBtn">Entrar</button>
                <p style="text-align:center; font-size:0.85rem; margin-top:15px; cursor:pointer; color: #94a3b8;" onclick="toggleA()">¿No tienes cuenta? <span style="color: var(--accent)">Regístrate</span></p>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Credenciales actualizadas de tu consola de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAocuJ_tFSsKKqKXtggvrrZgWDAPqt2uek",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0",
            measurementId: "G-9E0XMD7R8S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userLog = null;
        let isReg = false;

        window.openM = (id) => document.getElementById(id).classList.add('active');
        window.closeM = (id) => document.getElementById(id).classList.remove('active');

        window.toggleA = () => {
            isReg = !isReg;
            document.getElementById('aName').style.display = isReg ? 'block' : 'none';
            document.getElementById('aTitle').innerText = isReg ? 'Crear Cuenta' : 'Iniciar Sesión';
            document.getElementById('aBtn').innerText = isReg ? 'Registrarse' : 'Entrar';
        };

        // Manejo de Autenticación
        document.getElementById('fAuth').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('aEmail').value;
            const pass = document.getElementById('aPass').value;
            const name = document.getElementById('aName').value;

            try {
                if(isReg) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: name });
                    alert("¡Cuenta creada con éxito!");
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                closeM('modalAuth');
            } catch(err) { 
                alert("Error: " + err.message); 
            }
        };

        onAuthStateChanged(auth, (u) => {
            userLog = u;
            if(u) {
                document.getElementById('userTag').innerText = "Hola, " + (u.displayName || "Lector");
            }
        });

        // Guardar Libro en Firestore
        document.getElementById('fPub').onsubmit = async (e) => {
            e.preventDefault();
            if(!userLog) return alert("Debes iniciar sesión para publicar libros");

            try {
                await addDoc(collection(db, "libros"), {
                    title: document.getElementById('pTitle').value,
                    cover: document.getElementById('pCover').value,
                    pdf: document.getElementById('pPdf').value,
                    author: userLog.displayName || "Anónimo",
                    createdAt: Date.now()
                });
                alert("Libro publicado correctamente");
                closeM('modalPub');
                document.getElementById('fPub').reset();
            } catch(err) { 
                alert("Error al publicar: " + err.message); 
            }
        };

        // Cargar libros en tiempo real
        const q = query(collection(db, "libros"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const b = doc.data();
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <img src="${b.cover}" class="book-cover" onerror="this.src='https://via.placeholder.com/200x260?text=Sin+Portada'">
                    <div style="font-weight: 700; font-size: 1.1rem; margin-bottom: 4px;">${b.title}</div>
                    <div style="font-size: 0.85rem; color: #94a3b8;">Subido por: ${b.author}</div>
                `;
                card.onclick = () => window.open(b.pdf, '_blank');
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
