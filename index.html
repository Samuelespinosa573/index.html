<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinas Bellas | Premium Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --verde: #1b4332;
            --verde-claro: #2d6a4f;
            --amarillo: #ffca3a;
            --crema: #f8f9fa;
            --oscuro: #081c15;
            --rojo: #e63946;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: #f0f2f5; color: var(--oscuro); padding-bottom: 100px; overflow-x: hidden; }

        /* Navbar mejorada */
        nav { 
            background: var(--verde); padding: 12px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nav-logo { font-family: 'Playfair Display', serif; color: var(--amarillo); font-size: 1.6rem; font-weight: 900; outline: none; transition: var(--transition); }
        .nav-logo:focus { border-bottom: 2px solid var(--amarillo); }

        /* Header con Efectos */
        header {
            background-size: cover; background-position: center;
            padding: 100px 20px; text-align: center; color: white; 
            border-bottom: 6px solid var(--amarillo);
            position: relative; overflow: hidden;
            transition: var(--transition);
        }
        .header-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)); z-index: 1; }
        .header-content { position: relative; z-index: 2; animation: fadeIn 1s ease; }
        
        #store-logo { 
            width:150px; height:150px; border-radius:50%; border:5px solid var(--amarillo); 
            object-fit:cover; background: white; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); transition: var(--transition);
        }
        #store-logo:hover { transform: scale(1.05); }

        /* Buscador Moderno */
        .search-container { padding: 25px 8%; background: white; margin-bottom: 20px; box-shadow: var(--shadow-soft); }
        #search-input { 
            width: 100%; padding: 15px 25px; border: 2px solid #eee; border-radius: 50px; 
            font-size: 1rem; transition: var(--transition); outline: none;
        }
        #search-input:focus { border-color: var(--verde-claro); box-shadow: 0 0 15px rgba(45, 106, 79, 0.1); }

        /* Grid y Cards Premium */
        .container { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { 
            background: white; border-radius: 25px; overflow: hidden; 
            box-shadow: var(--shadow-soft); position: relative; text-align: center; 
            border: 1px solid rgba(0,0,0,0.03); transition: var(--transition);
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; transition: 0.5s; }
        .card:hover img { transform: scale(1.08); }
        
        .badge-agotado { 
            position: absolute; top: 15px; right: 15px; background: var(--rojo); 
            color: white; padding: 6px 12px; border-radius: 12px; font-size: 0.75rem; 
            font-weight: 800; z-index: 5; box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
        }

        /* Botones Estilizados */
        button { padding: 12px 25px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-y { background: var(--amarillo); color: var(--oscuro); box-shadow: 0 4px 15px rgba(255, 202, 58, 0.2); }
        .btn-y:hover { background: #f9bc15; transform: scale(1.05); }
        .btn-v { background: var(--verde-claro); color: white; box-shadow: 0 4px 15px rgba(45, 106, 79, 0.2); }
        .btn-v:hover { background: var(--verde); transform: scale(1.05); }

        /* Sidebars Glassmorphism */
        .sidebar { 
            position: fixed; top: 0; right: -100%; width: 380px; max-width: 95%; height: 100%; 
            background: var(--glass); backdrop-filter: blur(15px); z-index: 5000; 
            transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); padding: 30px; 
            box-shadow: -15px 0 35px rgba(0,0,0,0.15); overflow-y: auto;
        }
        .sidebar.active { right: 0; }
        
        /* Footer Admin */
        .admin-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--oscuro); 
            padding: 20px; display: none; justify-content: center; gap: 15px; z-index: 4000; 
            border-top: 4px solid var(--amarillo); flex-wrap: wrap; animation: slideUp 0.5s ease;
        }
        body.admin-mode .admin-footer { display: flex; }

        #diag-panel { 
            display: none; background: white; border-radius: 20px; padding: 25px; 
            margin-top: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border: 1px solid #eee;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body id="main-body">

    <nav>
        <div class="nav-logo" id="nav-title" onblur="if(isBoss) saveChanges()">ESPINAS BELLAS</div>
        <div style="display:flex; gap:12px;">
            <button class="btn-y" onclick="openSidebar('cart-sidebar')">🛒 <span id="cart-count">0</span></button>
            <button class="btn-y" onclick="openSidebar('user-sidebar')">👤 Perfil</button>
            <button class="btn-y" style="background:white;" onclick="handleBossButton()">🛠️</button>
        </div>
    </nav>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 ¿Qué estás buscando hoy? Escribe aquí..." oninput="filterProducts()">
    </div>

    <header id="dynamic-header" onclick="if(isBoss) editBackground()">
        <div class="header-overlay"></div>
        <div class="header-content">
            <img src="https://via.placeholder.com/150" id="store-logo" title="Clic para cambiar logo" onclick="event.stopPropagation(); if(isBoss) editLogo()">
            <h1 id="store-name" style="font-family: 'Playfair Display', serif; font-size: 3rem; margin-top: 15px;" onblur="if(isBoss) saveChanges()">...</h1>
            <p id="store-slogan" style="font-size: 1.2rem; opacity: 0.9;" onblur="if(isBoss) saveChanges()">Calidad y Frescura garantizada</p>
        </div>
    </header>

    <section class="container">
        <div class="grid" id="product-grid"></div>

        <div id="diag-panel">
            <h3 style="color:var(--verde); margin-bottom:15px; display:flex; align-items:center; gap:10px;">🛠️ Análisis de Salud del Sistema</h3>
            <div id="diag-results" style="line-height: 1.8; color: #555;"></div>
            <button class="btn-v" onclick="document.getElementById('diag-panel').style.display='none'" style="width:100%; margin-top:20px;">Finalizar Revisión</button>
        </div>
    </section>

    <aside class="sidebar" id="user-sidebar">
        <button class="btn-y" onclick="closeSidebars()" style="margin-bottom:30px;">← Volver</button>
        <div id="auth-section">
            <h2 id="auth-status" style="margin-bottom:20px;">Inicia Sesión</h2>
            <div id="login-view">
                <input type="email" id="login-email" placeholder="Correo Electrónico">
                <input type="password" id="login-pass" placeholder="Contraseña">
                <button class="btn-v" style="width:100%; margin-top:15px;" onclick="signIn()">Entrar al Sistema</button>
                <button class="btn-y" style="width:100%; margin-top:10px;" onclick="switchAuth(true)">Crear cuenta nueva</button>
            </div>
            <div id="register-view" style="display:none;">
                <input type="text" id="reg-name" placeholder="Nombre completo">
                <input type="email" id="reg-email" placeholder="Correo">
                <input type="password" id="reg-pass" placeholder="Contraseña">
                <button class="btn-v" style="width:100%;" onclick="signUp()">Registrarme</button>
                <button onclick="switchAuth(false)" style="background:none; color:var(--verde); width:100%; margin-top:10px; font-size:0.85rem;">Ya tengo una cuenta registrada</button>
            </div>
            <button id="logout-btn" class="btn-v" style="background:var(--rojo); display:none; width:100%; margin-top:20px;" onclick="signOut()">Cerrar Mi Sesión</button>
        </div>

        <div id="admin-settings-ui" style="display:none; margin-top:40px; border-top:2px solid #eee; padding-top:25px;">
            <h3 style="color:var(--verde); margin-bottom:15px;">Ajustes de Administrador</h3>
            <label style="font-size: 0.8rem; font-weight: 700;">WhatsApp (con código de país):</label>
            <input type="text" id="edit-wa" placeholder="Ej: 57321...">
            <label style="font-size: 0.8rem; font-weight: 700;">Nueva ID de Acceso:</label>
            <input type="text" id="edit-boss-id">
            <label style="font-size: 0.8rem; font-weight: 700;">Nueva Clave de Acceso:</label>
            <input type="password" id="edit-boss-pass">
            <input type="password" id="confirm-old-pass" placeholder="Confirma clave actual para guardar" style="border-color: var(--amarillo);">
            <button class="btn-v" style="width:100%; background:var(--oscuro);" onclick="updateAdminCreds()">Aplicar Cambios</button>
        </div>
    </aside>

    <aside class="sidebar" id="cart-sidebar">
        <button class="btn-y" onclick="closeSidebars()">← Volver</button>
        <h2 style="margin:25px 0 15px;">Tu Pedido Actual</h2>
        <div id="cart-items-list" style="max-height: 50vh; overflow-y: auto;"></div>
        <div style="padding-top: 20px; border-top: 2px solid #eee; margin-top: 20px;">
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.6rem;">
                <span>Total:</span><span id="cart-total">$0</span>
            </div>
            <button class="btn-v" style="width:100%; margin-top:25px; padding: 18px;" onclick="checkout()">🚀 FINALIZAR EN WHATSAPP</button>
        </div>
    </aside>

    <footer class="admin-footer">
        <button class="btn-y" onclick="runDiagnostics()">🔍 Análisis Profundo</button>
        <button class="btn-v" onclick="addProduct()">✨ Nuevo Producto</button>
        <button class="btn-y" onclick="saveChanges()">💾 GUARDAR TODO</button>
        <button class="btn-v" style="background:var(--rojo);" onclick="exitBossMode()">Cerrar Edición</button>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOCuJ_tFSsKKqKXtgGvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com",
            projectId: "fruteria-las-espinas"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isBoss = false;
        let bossCreds = { id: "24375245", pass: "1234", wa: "3212968875" };
        let allProductsData = {};
        let cart = [];

        function openSidebar(id) { document.getElementById(id).classList.add('active'); }
        function closeSidebars() { document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('active')); }

        // Gestión Modo Jefe
        function handleBossButton() {
            if (isBoss) { openSidebar('user-sidebar'); }
            else {
                const id = prompt("Ingrese ID de Administrador:");
                const pass = prompt("Ingrese Clave:");
                if(id === bossCreds.id && pass === bossCreds.pass) {
                    isBoss = true;
                    document.body.classList.add('admin-mode');
                    document.getElementById('admin-settings-ui').style.display = 'block';
                    ["nav-title", "store-name", "store-slogan"].forEach(id => document.getElementById(id).contentEditable = true);
                    renderProducts();
                    alert("Modo Edición Activado");
                } else { alert("Acceso Denegado"); }
            }
        }

        function exitBossMode() {
            isBoss = false;
            document.body.classList.remove('admin-mode');
            document.getElementById('admin-settings-ui').style.display = 'none';
            ["nav-title", "store-name", "store-slogan"].forEach(id => document.getElementById(id).contentEditable = false);
            closeSidebars();
            renderProducts();
        }

        // Renderizado y Lógica de Productos
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            for(let k in allProductsData) {
                const p = allProductsData[k];
                const stock = p.stock || 0;
                grid.innerHTML += `
                    <div class="card" data-key="${k}" data-name="${p.nombre.toLowerCase()}">
                        ${stock <= 0 ? '<div class="badge-agotado">AGOTADO</div>' : ''}
                        <img src="${p.imagen}" onclick="if(isBoss) editImg('${k}')">
                        <div style="padding:20px;">
                            <h3 class="e-n" contenteditable="${isBoss}">${p.nombre}</h3>
                            <p class="e-p" contenteditable="${isBoss}" style="color:var(--verde-claro); font-weight:800; font-size:1.2rem; margin: 10px 0;">${p.precio}</p>
                            ${isBoss ? `<div style="font-size:0.8rem; color:#888;">Stock Actual: <input type="number" class="e-s" value="${stock}" style="width:60px; padding:4px;"></div>` : ''}
                            <button class="btn-v" style="width:100%; margin-top:15px;" 
                                onclick="addToCart('${k}')" ${stock <= 0 ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>
                                ${stock <= 0 ? 'Sin Existencias' : '🛒 Añadir al Carrito'}
                            </button>
                            ${isBoss ? `<p onclick="del('${k}')" style="color:red; cursor:pointer; font-size:0.7rem; margin-top:15px; font-weight:bold; letter-spacing:1px;">ELIMINAR PRODUCTO</p>` : ''}
                        </div>
                    </div>`;
            }
        }

        function addToCart(key) {
            const p = allProductsData[key], existing = cart.find(i => i.key === key);
            if(existing) {
                if(existing.qty < p.stock) existing.qty++; else return alert("Lo sentimos, no hay más unidades disponibles.");
            } else { cart.push({key, name: p.nombre, price: p.precio, qty: 1}); }
            updateCartUI();
        }

        function updateCartQty(key, delta) {
            const item = cart.find(i => i.key === key), p = allProductsData[key];
            if(item) {
                item.qty += delta;
                if(item.qty > p.stock) { item.qty = p.stock; alert("Máximo alcanzado"); }
                if(item.qty <= 0) cart = cart.filter(i => i.key !== key);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items-list'); list.innerHTML = "";
            let total = 0, count = 0;
            cart.forEach(item => {
                const pNum = parseInt(item.price.replace(/\D/g,'')) || 0, sub = pNum * item.qty;
                total += sub; count += item.qty;
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:white; padding:15px; border-radius:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
                        <div><b style="font-size:1.1rem;">${item.name}</b><br><small style="color:var(--verde-claro); font-weight:700;">$${sub.toLocaleString()}</small></div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <button class="qty-btn" onclick="updateCartQty('${item.key}', -1)">-</button>
                            <span style="font-weight:800;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateCartQty('${item.key}', 1)">+</button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = "$" + total.toLocaleString();
            document.getElementById('cart-count').innerText = count;
        }

        // Finalización de Pedido
        function checkout() {
            if(cart.length === 0) return alert("Tu carrito está vacío.");
            let msg = `*🛒 NUEVO PEDIDO - ESPINAS BELLAS*\n---------------------------\n`;
            cart.forEach(i => msg += `✅ ${i.qty}x ${i.name} (${i.price})\n`);
            msg += `---------------------------\n*💰 TOTAL A PAGAR: ${document.getElementById('cart-total').innerText}*`;
            
            const up = {};
            cart.forEach(i => {
                const nS = (allProductsData[i.key].stock || 0) - i.qty;
                up[`productos/${i.key}/stock`] = nS < 0 ? 0 : nS;
            });
            db.ref().update(up).then(() => { 
                window.open(`https://wa.me/${bossCreds.wa.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank'); 
                cart = []; updateCartUI(); closeSidebars(); 
            });
        }

        // Funciones de Administrador
        function editBackground() { const url = prompt("Pegue URL de imagen de fondo:"); if(url) db.ref('config/background').set(url); }
        function editLogo() { const url = prompt("Pegue URL de nuevo logo:"); if(url) db.ref('config/logo').set(url); }
        function editImg(k) { const url = prompt("Pegue URL de imagen del producto:"); if(url) db.ref(`productos/${k}/imagen`).set(url); }

        function runDiagnostics() {
            const res = document.getElementById('diag-results'); document.getElementById('diag-panel').style.display = 'block';
            res.innerHTML = `
                🔹 <b>Firebase:</b> Conectado y Sincronizado.<br>
                🔹 <b>Catálogo:</b> ${Object.keys(allProductsData).length} productos detectados.<br>
                🔹 <b>Canal de Venta:</b> WhatsApp configurado al +${bossCreds.wa}.<br>
                🔹 <b>Rendimiento:</b> Interfaz Premium y modo dinámico OK.`;
        }

        function saveChanges() {
            const up = {};
            up['config/nav_title'] = document.getElementById('nav-title').innerText;
            up['config/name'] = document.getElementById('store-name').innerText;
            up['config/slogan'] = document.getElementById('store-slogan').innerText;
            document.querySelectorAll('.card').forEach(c => {
                const k = c.dataset.key;
                up[`productos/${k}/nombre`] = c.querySelector('.e-n').innerText;
                up[`productos/${k}/precio`] = c.querySelector('.e-p').innerText;
                if(isBoss) up[`productos/${k}/stock`] = parseInt(c.querySelector('.e-s').value || 0);
            });
            db.ref().update(up).then(() => alert("Base de datos actualizada correctamente."));
        }

        function updateAdminCreds() {
            const old = document.getElementById('confirm-old-pass').value;
            if(old !== bossCreds.pass) return alert("Error: La clave actual no coincide.");
            const newObj = {
                id: document.getElementById('edit-boss-id').value || bossCreds.id,
                pass: document.getElementById('edit-boss-pass').value || bossCreds.pass,
                wa: document.getElementById('edit-wa').value || bossCreds.wa
            };
            db.ref('config/admin').set(newObj).then(() => { alert("Credenciales actualizadas. La página se reiniciará."); location.reload(); });
        }

        // Sistema de Autenticación Clientes
        function switchAuth(isReg) {
            document.getElementById('login-view').style.display = isReg ? 'none' : 'block';
            document.getElementById('register-view').style.display = isReg ? 'block' : 'none';
        }
        function signUp() {
            const e = document.getElementById('reg-email').value, p = document.getElementById('reg-pass').value, n = document.getElementById('reg-name').value;
            auth.createUserWithEmailAndPassword(e, p).then(r => r.user.updateProfile({displayName: n}).then(() => location.reload())).catch(err => alert(err.message));
        }
        function signIn() {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
        }
        function signOut() { auth.signOut().then(() => location.reload()); }

        function addProduct() { db.ref('productos').push({ nombre: "Nuevo Producto", precio: "$0.000", stock: 10, imagen: "https://via.placeholder.com/400x300" }); }
        function del(k) { if(confirm("¿Seguro que desea eliminar este producto para siempre?")) db.ref('productos/'+k).remove(); }
        
        function filterProducts() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => c.style.display = c.dataset.name.includes(q) ? 'block' : 'none');
        }

        // Listeners en Tiempo Real
        db.ref('productos').on('value', snap => { allProductsData = snap.val() || {}; renderProducts(); });
        db.ref('config').on('value', snap => {
            const c = snap.val(); if(!c) return;
            if(c.nav_title) document.getElementById('nav-title').innerText = c.nav_title;
            if(c.name) document.getElementById('store-name').innerText = c.name;
            if(c.slogan) document.getElementById('store-slogan').innerText = c.slogan;
            if(c.logo) document.getElementById('store-logo').src = c.logo;
            if(c.background) document.getElementById('dynamic-header').style.backgroundImage = `url('${c.background}')`;
            if(c.admin) { 
                bossCreds = c.admin; 
                document.getElementById('edit-wa').value = bossCreds.wa; 
                document.getElementById('edit-boss-id').value = bossCreds.id; 
            }
        });
        auth.onAuthStateChanged(u => {
            const st = document.getElementById('auth-status');
            if(u) { st.innerText = "¡Hola, " + (u.displayName || "Usuario") + "!"; document.getElementById('login-view').style.display='none'; document.getElementById('logout-btn').style.display='block'; }
            else { st.innerText = "Inicia Sesión"; document.getElementById('login-view').style.display='block'; document.getElementById('logout-btn').style.display='none'; }
        });
    </script>
</body>
</html>
