<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinas Bellas | Modo Jefe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --verde-bosque: #2d6a4f;
            --amarillo: #ffca3a;
            --oscuro: #1b1b1b;
            --rojo: #ff595e;
            --azul: #3a86ff;
            --blanco: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: #f4f4f4; overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            background: var(--verde-bosque);
            color: white;
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-entrar {
            background: var(--amarillo);
            color: #333;
            border: none;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* --- SIDEBAR (MENÚ LATERAL) --- */
        .sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 320px;
            height: 100%;
            background: white;
            z-index: 2000;
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px;
        }

        .sidebar.active { right: 0; }
        .sidebar h2 { color: var(--verde-bosque); margin-bottom: 20px; border-bottom: 3px solid var(--amarillo); }

        /* --- MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000;
        }

        .modal-content {
            background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px;
        }

        /* --- ELEMENTOS DE ADMIN --- */
        .admin-controls, .footer-admin { display: none; }
        body.admin-mode .admin-controls, body.admin-mode .footer-admin { display: block; }
        body.admin-mode .btn-entrar { display: none; } /* OCULTA EL BOTÓN AL ENTRAR */

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn-main { background: var(--amarillo); color: #333; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        .footer-admin {
            position: fixed; bottom: 0; width: 100%; background: var(--oscuro);
            padding: 15px; display: none; text-align: center; z-index: 1500;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
    </style>
</head>
<body id="body-tag">

    <header>
        <div>Espinas Bellas</div>
        <button class="btn-entrar" id="btn-login-trigger" onclick="openModal()">Entrar al Sistema</button>
        <button class="btn-entrar" id="btn-menu-trigger" style="display:none; background: var(--blanco);" onclick="toggleSidebar()">Menú Lateral ☰</button>
    </header>

    <aside class="sidebar" id="sidebar">
        <h2>Panel Jefe</h2>
        <div class="admin-controls">
            <p style="font-size: 0.9rem; margin-bottom: 15px;">Gestión de Credenciales</p>
            <input type="password" id="oldPass" placeholder="Contraseña Anterior">
            <input type="text" id="newId" placeholder="Nuevo ID">
            <input type="password" id="newPass" placeholder="Nueva Contraseña">
            <button class="btn-main" style="background: var(--azul); color: white;" onclick="updateCreds()">Guardar Credenciales</button>
            
            <hr style="margin: 20px 0;">
            <button class="btn-main" style="background: var(--rojo); color: white;" onclick="logout()">Cerrar Sesión</button>
        </div>
        <button class="btn-main" style="margin-top: 20px; background: #eee;" onclick="toggleSidebar()">Cerrar</button>
    </aside>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 10px;">Acceso Seguro</h2>
            <p style="color: #666; margin-bottom: 20px;">ingrese su usuario y contraseña para inicias sus compras</p>
            <input type="text" id="userId" placeholder="Usuario">
            <input type="password" id="userPass" placeholder="Contraseña">
            <button class="btn-main" onclick="processLogin()">Entrar</button>
            <p onclick="closeModal()" style="margin-top: 15px; cursor: pointer; color: var(--rojo);">Cancelar</p>
        </div>
    </div>

    <section style="background: #eee; height: 200px; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <h1>Frutería Las Espinas Bellas</h1>
        <p>Calidad en cada bocado</p>
    </section>

    <main class="grid" id="product-grid">
        </main>

    <footer class="footer-admin" id="footer-admin">
        <button class="btn-main" style="width: auto; padding: 10px 20px; background: #25d366; color: white;" onclick="addProd()">+ Fruta</button>
        <button class="btn-main" style="width: auto; padding: 10px 20px; background: var(--azul); color: white;" onclick="saveChanges()">💾 Guardar Cambios</button>
        <button class="btn-main" style="width: auto; padding: 10px 20px; background: var(--rojo); color: white;" onclick="logout()">Salir</button>
    </footer>

    <script>
        // FIREBASE
        const firebaseConfig = { databaseURL: "TU_URL_AQUÍ" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let adminData = { id: "24375245", pass: "1234" };

        function openModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('loginModal').style.display = 'none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        function processLogin() {
            const id = document.getElementById('userId').value;
            const pass = document.getElementById('userPass').value;

            if(id === adminData.id && pass === adminData.pass) {
                document.getElementById('body-tag').classList.add('admin-mode');
                document.getElementById('btn-login-trigger').style.display = 'none';
                document.getElementById('btn-menu-trigger').style.display = 'block';
                closeModal();
                toggleSidebar(); // ABRE EL MENÚ LATERAL AUTOMÁTICAMENTE
            } else {
                alert("Credenciales incorrectas");
            }
        }

        function logout() {
            document.getElementById('body-tag').classList.remove('admin-mode');
            document.getElementById('btn-login-trigger').style.display = 'block';
            document.getElementById('btn-menu-trigger').style.display = 'none';
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }

        function updateCreds() {
            const old = document.getElementById('oldPass').value;
            if(old === adminData.pass) {
                adminData.id = document.getElementById('newId').value;
                adminData.pass = document.getElementById('newPass').value;
                alert("Credenciales actualizadas ✅");
            } else {
                alert("Contraseña anterior incorrecta");
            }
        }

        // Carga de productos simplificada
        function loadProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = `
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1560806887-1e4cd0b6bcd6?w=400">
                    <div style="padding: 15px;">
                        <h3>Manzana Roja</h3>
                        <p>$2.500</p>
                    </div>
                </div>
            `;
        }
        window.onload = loadProducts;
    </script>
</body>
</html>
