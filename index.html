<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinas Bellas | Frutería Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --verde: #1b4332;
            --verde-claro: #2d6a4f;
            --amarillo: #ffca3a;
            --crema: #f8f9fa;
            --oscuro: #081c15;
            --rojo: #e63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--crema); color: var(--oscuro); padding-bottom: 80px; transition: 0.3s; }

        /* --- NAVEGACIÓN --- */
        nav { 
            background: var(--verde); 
            padding: 15px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .nav-logo { font-family: 'Playfair Display', serif; color: var(--amarillo); font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=1200');
            background-size: cover; background-position: center;
            padding: 100px 20px; text-align: center; color: white;
            border-bottom: 6px solid var(--amarillo);
        }
        #store-logo {
            width: 140px; height: 140px; border-radius: 50%;
            object-fit: cover; background: white; border: 4px solid var(--amarillo);
            cursor: pointer; transition: transform 0.3s;
        }
        #store-logo:hover { transform: scale(1.05); }
        #store-name { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-top: 15px; }

        /* --- PRODUCTOS --- */
        .container { padding: 40px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 20px; }
        .price { font-size: 1.4rem; font-weight: 800; color: var(--verde-claro); margin-bottom: 15px; display: block; }

        /* --- BOTONES --- */
        button { padding: 12px 25px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-y { background: var(--amarillo); color: var(--oscuro); }
        .btn-v { background: var(--verde-claro); color: white; width: 100%; }
        .btn-y:hover, .btn-v:hover { opacity: 0.9; transform: scale(1.02); }

        /* --- PANEL LATERAL (SIDEBAR) --- */
        .sidebar { 
            position: fixed; top: 0; right: -100%; width: 340px; height: 100%; 
            background: white; z-index: 5000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 40px 25px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto;
        }
        .sidebar.active { right: 0; }
        .sidebar h2 { font-family: 'Playfair Display', serif; margin-bottom: 25px; border-bottom: 2px solid var(--amarillo); padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; background: #fdfdfd; }
        label { font-size: 0.85rem; font-weight: 700; color: var(--verde); margin-top: 10px; display: block; }

        /* --- PANEL DUEÑO --- */
        .admin-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--oscuro); 
            padding: 15px; display: none; justify-content: center; gap: 20px; z-index: 3000; 
        }
        body.admin-mode .admin-footer { display: flex; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 4000; }
        
        [contenteditable="true"]:focus { background: #fffde7; outline: 2px dashed var(--amarillo); border-radius: 5px; }
    </style>
</head>
<body id="main-body">

    <nav>
        <div class="nav-logo">ESPINAS BELLAS</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-y" onclick="toggleSidebar()">Mi Cuenta</button>
            <button class="btn-y" style="background:white;" onclick="handleBossButton()">Dueño</button>
        </div>
    </nav>

    <header>
        <img src="https://via.placeholder.com/150" id="store-logo" onclick="if(isBoss) editLogo()">
        <h1 id="store-name">Espinas Bellas</h1>
        <p id="store-slogan">Calidad y Frescura en tu hogar</p>
    </header>

    <section class="container">
        <div class="grid" id="product-grid"></div>
    </section>

    <aside class="sidebar" id="sidebar">
        <h2 id="sidebar-title">Menú Lateral</h2>
        
        <div id="auth-ui">
            <p id="auth-status" style="margin-bottom:15px; font-weight:600; color:#666;"></p>
            <div id="auth-inputs">
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="pass" placeholder="Contraseña">
                <button class="btn-v" style="margin-top:10px;" onclick="authAction('login')">Ingresar</button>
                <button class="btn-y" style="width:100%; margin-top:10px;" onclick="authAction('signup')">Crear Cuenta</button>
            </div>
            <button id="logout-btn" class="btn-v" style="background:var(--rojo); display:none; margin-top:20px;" onclick="signOut()">Cerrar Sesión</button>
        </div>

        <div id="admin-settings-ui" style="display: none; margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee;">
            <h3 style="color: var(--verde-claro); margin-bottom: 15px;">⚙️ Ajustes de Jefe</h3>
            
            <label>Número de WhatsApp (con código de país)</label>
            <input type="text" id="edit-wa" placeholder="Ej: 573212968875">
            
            <label>Nueva ID de Acceso</label>
            <input type="text" id="edit-boss-id" placeholder="Nueva ID">
            
            <label>Nueva Contraseña de Jefe</label>
            <input type="password" id="edit-boss-pass" placeholder="Nueva clave">
            
            <div style="background: #fff3f3; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #ffebeb;">
                <label style="color: var(--rojo);">Validar con Clave Actual</label>
                <input type="password" id="confirm-old-pass" placeholder="Contraseña actual para guardar">
                <button class="btn-y" style="width: 100%; font-weight: 800;" onclick="updateAdminCreds()">GUARDAR AJUSTES</button>
            </div>
        </div>

        <button class="btn-y" style="width:100%; margin-top:40px; background:#eee;" onclick="toggleSidebar()">Cerrar Panel</button>
    </aside>

    <div id="boss-modal" class="modal">
        <div style="background:white; padding:40px; border-radius:30px; text-align:center; width:90%; max-width:350px;">
            <h3>Panel de Control</h3>
            <input type="text" id="b-id" placeholder="ID de Jefe">
            <input type="password" id="b-pass" placeholder="Contraseña">
            <button class="btn-v" onclick="bossLogin()">Entrar</button>
            <p onclick="closeBossModal()" style="margin-top:15px; color:red; cursor:pointer; font-weight:700;">Cancelar</p>
        </div>
    </div>

    <footer class="admin-footer" id="admin-menu">
        <button class="btn-v" onclick="addProduct()" style="width:auto;">+ Nueva Fruta</button>
        <button class="btn-y" onclick="saveChanges()" style="min-width:200px;">💾 GUARDAR CAMBIOS</button>
        <button class="btn-v" style="background:var(--rojo); width:auto;" onclick="location.reload()">Salir Modo Admin</button>
    </footer>

    <script>
        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAOCuJ_tFSsKKqKXtgGvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isBoss = false;
        let bossCreds = { id: "24375245", pass: "1234", wa: "573212968875" }; // Valores por defecto

        // --- INTERFAZ ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openBossModal() { document.getElementById('boss-modal').style.display = 'flex'; }
        function closeBossModal() { document.getElementById('boss-modal').style.display = 'none'; }

        function handleBossButton() {
            if (isBoss) toggleSidebar(); // Si ya es jefe, abre el panel con ajustes
            else openBossModal();
        }

        // --- SISTEMA DE JEFE ---
        function bossLogin() {
            const inputId = document.getElementById('b-id').value;
            const inputPass = document.getElementById('b-pass').value;

            if(inputId === bossCreds.id && inputPass === bossCreds.pass) {
                isBoss = true;
                document.body.classList.add('admin-mode');
                document.getElementById('admin-settings-ui').style.display = 'block';
                document.getElementById('sidebar-title').innerText = "Panel de Control 👑";
                document.getElementById('edit-wa').value = bossCreds.wa;
                
                document.getElementById('store-name').contentEditable = true;
                document.getElementById('store-slogan').contentEditable = true;
                
                closeBossModal();
                loadProducts();
                alert("Bienvenido, Jefe.");
            } else {
                alert("ID o Clave incorrecta");
            }
        }

        function updateAdminCreds() {
            const newWA = document.getElementById('edit-wa').value;
            const newID = document.getElementById('edit-boss-id').value;
            const newPass = document.getElementById('edit-boss-pass').value;
            const confirmPass = document.getElementById('confirm-old-pass').value;

            if (confirmPass !== bossCreds.pass) {
                alert("❌ Error: Debes ingresar la contraseña actual para aplicar cambios.");
                return;
            }

            if (newWA) bossCreds.wa = newWA;
            if (newID) bossCreds.id = newID;
            if (newPass) bossCreds.pass = newPass;

            // Guardar en Firebase para que los cambios sean permanentes
            db.ref('config/admin').set(bossCreds).then(() => {
                alert("✅ Ajustes actualizados con éxito.");
                document.getElementById('confirm-old-pass').value = "";
            });
        }

        // --- AUTH USUARIOS ---
        function authAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Completa los datos");
            if(type === 'signup') auth.createUserWithEmailAndPassword(e, p).then(()=>alert("Cuenta Creada")).catch(err=>alert(err.message));
            else auth.signInWithEmailAndPassword(e, p).then(()=>toggleSidebar()).catch(()=>alert("Error al ingresar"));
        }

        auth.onAuthStateChanged(user => {
            const status = document.getElementById('auth-status');
            const inputs = document.getElementById('auth-inputs');
            const logout = document.getElementById('logout-btn');
            if(user) {
                inputs.style.display = 'none'; logout.style.display = 'block';
                status.innerText = "Sesión: " + user.email;
            } else {
                inputs.style.display = 'block'; logout.style.display = 'none';
                status.innerText = "No has iniciado sesión";
            }
        });

        function signOut() { auth.signOut().then(()=>location.reload()); }

        // --- PRODUCTOS Y CONFIGURACIÓN ---
        function loadProducts() {
            db.ref('productos').on('value', snap => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    grid.innerHTML += `
                        <div class="card" data-key="${child.key}">
                            <img src="${p.imagen}" onclick="if(isBoss) editImg('${child.key}')">
                            <div class="card-info">
                                <h3 contenteditable="${isBoss}" class="e-n">${p.nombre}</h3>
                                <span contenteditable="${isBoss}" class="price e-p">${p.precio}</span>
                                <button class="btn-v" onclick="order('${p.nombre}')">WhatsApp</button>
                                ${isBoss ? `<p onclick="del('${child.key}')" style="color:red; cursor:pointer; margin-top:10px; font-weight:bold;">Eliminar 🗑️</p>` : ''}
                            </div>
                        </div>`;
                });
            });
        }

        function saveChanges() {
            const updates = {};
            updates['config/name'] = document.getElementById('store-name').innerText;
            updates['config/slogan'] = document.getElementById('store-slogan').innerText;
            document.querySelectorAll('.card').forEach(c => {
                const k = c.getAttribute('data-key');
                updates[`productos/${k}/nombre`] = c.querySelector('.e-n').innerText;
                updates[`productos/${k}/precio`] = c.querySelector('.e-p').innerText;
            });
            db.ref().update(updates).then(() => alert("Cambios guardados en la nube."));
        }

        function order(item) {
            const user = auth.currentUser;
            if(!user) return alert("Inicia sesión para pedir.");
            window.open(`https://wa.me/${bossCreds.wa}?text=Hola soy ${user.email}, quiero pedir: ${item}`);
        }

        function addProduct() { db.ref('productos').push({ nombre: "Nueva Fruta", precio: "$0.000", imagen: "https://via.placeholder.com/300" }); }
        function del(k) { if(confirm("¿Borrar producto?")) db.ref('productos/'+k).remove(); }
        function editImg(k) { const u = prompt("URL de imagen:"); if(u) db.ref('productos/'+k+'/imagen').set(u); }
        function editLogo() { const u = prompt("URL del logo:"); if(u) db.ref('config/logo').set(u); }

        // Sincronizar configuración general
        db.ref('config').on('value', snap => {
            const c = snap.val();
            if(c) {
                if(c.name) document.getElementById('store-name').innerText = c.name;
                if(c.slogan) document.getElementById('store-slogan').innerText = c.slogan;
                if(c.logo) document.getElementById('store-logo').src = c.logo;
                if(c.admin) bossCreds = c.admin;
            }
        });

        window.onload = loadProducts;
    </script>
</body>
</html>
