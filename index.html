<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espinas Bellas | Frutería Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --verde: #1b4332;
            --verde-claro: #2d6a4f;
            --amarillo: #ffca3a;
            --crema: #f8f9fa;
            --oscuro: #081c15;
            --rojo: #e63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--crema); color: var(--oscuro); padding-bottom: 80px; }

        /* --- NAVEGACIÓN --- */
        nav { 
            background: var(--verde); 
            padding: 18px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .nav-logo { font-family: 'Playfair Display', serif; color: var(--amarillo); font-size: 1.5rem; font-weight: 900; }

        /* --- HEADER --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?w=1200');
            background-size: cover; background-position: center;
            padding: 80px 20px; text-align: center; color: white;
            border-bottom: 6px solid var(--amarillo);
        }
        #store-logo {
            width: 140px; height: 140px; border-radius: 50%;
            object-fit: cover; background: white; border: 4px solid var(--amarillo);
            cursor: pointer;
        }
        #store-name { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-top: 10px; }

        /* --- PRODUCTOS --- */
        .container { padding: 40px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .card img { width: 100%; height: 220px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 20px; }
        .price { font-size: 1.3rem; font-weight: 800; color: var(--verde-claro); margin-bottom: 15px; display: block; }

        /* --- BOTONES --- */
        button { padding: 12px 25px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-y { background: var(--amarillo); color: var(--oscuro); }
        .btn-v { background: var(--verde-claro); color: white; width: 100%; }

        /* --- PANEL LATERAL (SIDEBAR) --- */
        .sidebar { 
            position: fixed; 
            top: 0; 
            right: -100%; 
            width: 320px; 
            height: 100%; 
            background: white; 
            z-index: 2000; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 40px 25px; 
            box-shadow: -10px 0 30px rgba(0,0,0,0.1); 
        }
        .sidebar.active { right: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; }

        /* --- PANEL DUEÑO --- */
        .admin-footer { 
            position: fixed; 
            bottom: 0; 
            left: 0;
            width: 100%; 
            background: var(--oscuro); 
            padding: 15px; 
            display: none; 
            justify-content: center; 
            gap: 20px; 
            z-index: 3000; 
        }
        body.admin-mode .admin-footer { display: flex; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 4000; }
        
        [contenteditable="true"]:focus { background: #fffde7; outline: 2px dashed var(--amarillo); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">ESPINAS BELLAS</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-y" onclick="toggleSidebar()">Mi Cuenta</button>
            <button class="btn-y" style="background:white;" onclick="openBossModal()">Dueño</button>
        </div>
    </nav>

    <header>
        <img src="https://via.placeholder.com/150" id="store-logo" onclick="if(isBoss) editLogo()">
        <h1 id="store-name">Espinas Bellas</h1>
        <p id="store-slogan">Frescura de la mejor calidad</p>
    </header>

    <section class="container">
        <div class="grid" id="product-grid"></div>
    </section>

    <aside class="sidebar" id="sidebar">
        <h2 style="font-family:'Playfair Display'; margin-bottom:20px;">Mi Cuenta</h2>
        <div id="auth-ui">
            <p id="auth-status" style="margin-bottom:15px; font-weight:600; color:#666;"></p>
            <div id="auth-inputs">
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="pass" placeholder="Contraseña">
                <button class="btn-v" style="margin-top:10px;" onclick="authAction('login')">Ingresar</button>
                <button class="btn-y" style="width:100%; margin-top:10px;" onclick="authAction('signup')">Crear Cuenta</button>
            </div>
            <button id="logout-btn" class="btn-v" style="background:var(--rojo); display:none; margin-top:20px;" onclick="signOut()">Cerrar Sesión</button>
        </div>
        <button class="btn-y" style="width:100%; margin-top:40px; background:#eee;" onclick="toggleSidebar()">Cerrar Panel</button>
    </aside>

    <div id="boss-modal" class="modal">
        <div style="background:white; padding:40px; border-radius:30px; text-align:center; width:90%; max-width:350px;">
            <h3>Panel de Control</h3>
            <input type="text" id="b-id" placeholder="ID de Jefe">
            <input type="password" id="b-pass" placeholder="Contraseña">
            <button class="btn-v" onclick="bossLogin()">Entrar</button>
            <p onclick="closeBossModal()" style="margin-top:15px; color:red; cursor:pointer; font-weight:700;">Cancelar</p>
        </div>
    </div>

    <footer class="admin-footer" id="admin-menu">
        <button class="btn-v" onclick="addProduct()" style="width:auto;">+ Nueva Fruta</button>
        <button class="btn-y" onclick="saveChanges()" style="min-width:200px;">💾 GUARDAR CAMBIOS</button>
        <button class="btn-v" style="background:var(--rojo); width:auto;" onclick="location.reload()">Salir Modo Admin</button>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAOCuJ_tFSsKKqKXtgGvrrZgWDAPqt2uEk",
            authDomain: "fruteria-las-espinas.firebaseapp.com",
            databaseURL: "https://fruteria-las-espinas-default-rtdb.firebaseio.com",
            projectId: "fruteria-las-espinas",
            storageBucket: "fruteria-las-espinas.firebasestorage.app",
            messagingSenderId: "995826892241",
            appId: "1:995826892241:web:19fc6ba9096ecac7d7f4f0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let isBoss = false;
        let bossCreds = { id: "24375245", pass: "1234", wa: "573223753362" };

        // Funciones de Interfaz
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openBossModal() { document.getElementById('boss-modal').style.display = 'flex'; }
        function closeBossModal() { document.getElementById('boss-modal').style.display = 'none'; }

        // --- SISTEMA DE USUARIOS (AUTH) ---
        function authAction(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Por favor, llena los datos");
            
            if(type === 'signup') {
                auth.createUserWithEmailAndPassword(e, p)
                    .then(() => alert("¡Cuenta creada exitosamente!"))
                    .catch(err => alert("Error: " + err.message));
            } else {
                auth.signInWithEmailAndPassword(e, p)
                    .then(() => toggleSidebar())
                    .catch(err => alert("Correo o contraseña incorrectos"));
            }
        }

        auth.onAuthStateChanged(user => {
            const inputs = document.getElementById('auth-inputs');
            const logout = document.getElementById('logout-btn');
            const status = document.getElementById('auth-status');
            if(user) {
                inputs.style.display = 'none';
                logout.style.display = 'block';
                status.innerText = "Hola: " + user.email;
            } else {
                inputs.style.display = 'block';
                logout.style.display = 'none';
                status.innerText = "Bienvenido, inicia sesión";
            }
        });

        function signOut() { auth.signOut().then(() => alert("Has cerrado sesión")); }

        // --- MODO ADMINISTRADOR (BOSS) ---
        function bossLogin() {
            if(document.getElementById('b-id').value === bossCreds.id && document.getElementById('b-pass').value === bossCreds.pass) {
                isBoss = true;
                document.body.classList.add('admin-mode');
                document.getElementById('store-name').contentEditable = true;
                document.getElementById('store-slogan').contentEditable = true;
                closeBossModal();
                loadProducts(); 
                alert("👑 Bienvenido Jefe de Frutería Las Espinas");
            } else { alert("ID o Clave incorrectos"); }
        }

        // --- PRODUCTOS ---
        function loadProducts() {
            db.ref('productos').on('value', snap => {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    grid.innerHTML += `
                        <div class="card" data-key="${child.key}">
                            <img src="${p.imagen}" onclick="if(isBoss) editImg('${child.key}')">
                            <div class="card-info">
                                <h3 contenteditable="${isBoss}" class="e-n">${p.nombre}</h3>
                                <span contenteditable="${isBoss}" class="price e-p">${p.precio}</span>
                                <button class="btn-v" onclick="order('${p.nombre}')">Pedir por WhatsApp</button>
                                ${isBoss ? `<p onclick="del('${child.key}')" style="color:red; cursor:pointer; margin-top:10px; font-weight:700; font-size:0.8rem;">Eliminar 🗑️</p>` : ''}
                            </div>
                        </div>
                    `;
                });
            });
        }

        function saveChanges() {
            const updates = {};
            updates['config/name'] = document.getElementById('store-name').innerText;
            updates['config/slogan'] = document.getElementById('store-slogan').innerText;
            document.querySelectorAll('.card').forEach(c => {
                const k = c.getAttribute('data-key');
                updates[`productos/${k}/nombre`] = c.querySelector('.e-n').innerText;
                updates[`productos/${k}/precio`] = c.querySelector('.e-p').innerText;
            });
            db.ref().update(updates).then(() => alert("✅ Cambios guardados en la nube"));
        }

        function order(item) {
            const user = auth.currentUser;
            if(!user) return alert("Primero debes iniciar sesión en 'Mi Cuenta'");
            window.open(`https://wa.me/${bossCreds.wa}?text=Hola! Soy ${user.email}. Quiero pedir: ${item}`);
        }

        function addProduct() { db.ref('productos').push({ nombre: "Nombre Fruta", precio: "$0.000", imagen: "https://via.placeholder.com/300" }); }
        function del(k) { if(confirm("¿Seguro que quieres borrar este producto?")) db.ref('productos/'+k).remove(); }
        function editImg(k) { const u = prompt("URL de la nueva imagen:"); if(u) db.ref('productos/'+k+'/imagen').set(u); }
        function editLogo() { const u = prompt("URL del logo:"); if(u) db.ref('config/logo').set(u); }

        db.ref('config').on('value', snap => {
            const c = snap.val();
            if(c) {
                if(c.name) document.getElementById('store-name').innerText = c.name;
                if(c.slogan) document.getElementById('store-slogan').innerText = c.slogan;
                if(c.logo) document.getElementById('store-logo').src = c.logo;
            }
        });

        window.onload = loadProducts;
    </script>
</body>
</html>
