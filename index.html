<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutería Dinámica - Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-principal: #2d6a4f;
            --verde-claro: #95d5b2;
            --amarillo-acento: #ffca3a;
            --blanco: #ffffff;
            --texto: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f4f4; color: var(--texto); padding-bottom: 50px; }

        /* --- MODO EDICIÓN --- */
        .edit-mode-active [contenteditable="true"] {
            border: 1px dashed var(--verde-principal);
            background: rgba(45, 106, 79, 0.05);
            padding: 2px;
        }
        .edit-mode-active img { cursor: pointer; border: 2px solid var(--amarillo-acento); }

        /* --- CABECERA --- */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1610348725531-843dff563e2c?auto=format&fit=crop&q=80&w=1000');
            background-size: cover; background-position: center;
            height: 35vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; color: white;
        }

        /* --- GRID DE PRODUCTOS --- */
        .container { padding: 30px 15px; max-width: 1200px; margin: auto; }
        .catalog { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative;
            display: flex; flex-direction: column;
        }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; flex-grow: 1; }
        .price { color: var(--verde-principal); font-weight: bold; font-size: 1.1rem; }

        /* --- BOTÓN AGREGAR --- */
        .add-card {
            border: 3px dashed #ccc; background: transparent;
            display: none; justify-content: center; align-items: center;
            font-size: 3rem; color: #ccc; cursor: pointer; min-height: 200px;
            border-radius: 15px;
        }
        .edit-mode-active .add-card { display: flex; }

        /* --- CONTROLES --- */
        .admin-controls {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--verde-principal); padding: 10px; border-radius: 8px;
        }
        .admin-controls button { 
            background: white; border: none; padding: 8px 12px; 
            margin: 2px; cursor: pointer; border-radius: 4px; font-weight: bold;
        }
        .save-bar {
            position: fixed; bottom: 0; width: 100%; background: var(--amarillo-acento);
            padding: 10px; text-align: center; display: none; z-index: 2000;
        }

        .btn-whatsapp {
            position: fixed; bottom: 70px; right: 20px; background: #25d366;
            color: white; width: 55px; height: 55px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: bold;
        }

        /* Ocultar botón eliminar si no es modo edición */
        .delete-btn {
            display: none; position: absolute; top: 5px; right: 5px;
            background: rgba(255,0,0,0.7); color: white; border: none;
            border-radius: 50%; width: 25px; height: 25px; cursor: pointer;
        }
        .edit-mode-active .delete-btn { display: block; }
    </style>
</head>
<body>

    <div class="admin-controls">
        <button onclick="window.location.reload()">Modo Cliente</button>
        <button onclick="enterAdminMode()">Modo Dueño</button>
    </div>

    <header>
        <h1 id="biz-name" contenteditable="false">Nombre de tu Negocio</h1>
        <p id="biz-slogan" contenteditable="false">Frutas y verduras frescas directo a tu hogar</p>
    </header>

    <div class="container">
        <div class="catalog" id="main-catalog">
            </div>
    </div>

    <div class="save-bar" id="save-bar">
        <span>¡Estás en modo edición!</span>
        <button onclick="saveAll()" style="padding: 5px 15px; margin-left: 10px; cursor: pointer;">Guardar Cambios</button>
    </div>

    <a href="#" id="whatsapp-btn" class="btn-whatsapp" target="_blank">W</a>

    <script>
        let isEditMode = false;
        let products = [
            { id: 1, name: "Tomate Chonto", price: "$3.500 / kg", img: "https://images.unsplash.com/photo-1512149177596-f817c7ef5d4c?w=400" },
            { id: 2, name: "Naranja Tangelo", price: "$2.800 / lb", img: "https://images.unsplash.com/photo-1557800636-894a64c1696f?w=400" }
        ];

        let config = {
            name: "Nombre de tu Negocio",
            slogan: "Frutas y verduras frescas directo a tu hogar",
            phone: "573000000000"
        };

        // Cargar datos al iniciar
        window.onload = () => {
            const savedProducts = localStorage.getItem('localProducts');
            const savedConfig = localStorage.getItem('localConfig');
            if(savedProducts) products = JSON.parse(savedProducts);
            if(savedConfig) config = JSON.parse(savedConfig);
            
            renderPage();
        };

        function renderPage() {
            // Aplicar Configuración General
            document.getElementById('biz-name').innerText = config.name;
            document.getElementById('biz-slogan').innerText = config.slogan;
            document.getElementById('whatsapp-btn').href = `https://wa.me/${config.phone}?text=Hola, quiero un pedido`;

            const catalog = document.getElementById('main-catalog');
            catalog.innerHTML = ''; // Limpiar

            // Generar tarjetas de productos
            products.forEach((p, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteProduct(${index})">×</button>
                    <img src="${p.img}" onclick="changeImg(${index})" title="Click para cambiar imagen">
                    <div class="card-info">
                        <h3 contenteditable="${isEditMode}" onblur="updateText(${index}, 'name', this)">${p.name}</h3>
                        <p class="price" contenteditable="${isEditMode}" onblur="updateText(${index}, 'price', this)">${p.price}</p>
                    </div>
                `;
                catalog.appendChild(card);
            });

            // Botón Agregar
            const addCard = document.createElement('div');
            addCard.className = 'add-card';
            addCard.innerHTML = '+';
            addCard.onclick = addProduct;
            catalog.appendChild(addCard);
        }

        function enterAdminMode() {
            const pass = prompt("Código de seguridad:");
            if(pass === "12345") {
                isEditMode = true;
                document.body.classList.add('edit-mode-active');
                document.getElementById('save-bar').style.display = 'block';
                document.getElementById('biz-name').contentEditable = true;
                document.getElementById('biz-slogan').contentEditable = true;
                renderPage();
                alert("Modo edición activado. Haz clic en los textos o imágenes para cambiar.");
            } else {
                alert("Código incorrecto");
            }
        }

        // --- FUNCIONES DE EDICIÓN ---

        function updateText(index, field, element) {
            products[index][field] = element.innerText;
        }

        function changeImg(index) {
            if(!isEditMode) return;
            const newUrl = prompt("Pega el enlace (URL) de la nueva imagen:", products[index].img);
            if(newUrl) {
                products[index].img = newUrl;
                renderPage();
            }
        }

        function addProduct() {
            const newP = {
                id: Date.now(),
                name: "Nuevo Producto",
                price: "$0.00",
                img: "https://images.unsplash.com/photo-1610348725531-843dff563e2c?w=400"
            };
            products.push(newP);
            renderPage();
        }

        function deleteProduct(index) {
            if(confirm("¿Eliminar este producto?")) {
                products.splice(index, 1);
                renderPage();
            }
        }

        function saveAll() {
            config.name = document.getElementById('biz-name').innerText;
            config.slogan = document.getElementById('biz-slogan').innerText;
            
            // Opcional: Preguntar por el teléfono al guardar
            const newPhone = prompt("Confirma o cambia tu número de WhatsApp (solo números):", config.phone);
            if(newPhone) config.phone = newPhone;

            localStorage.setItem('localProducts', JSON.stringify(products));
            localStorage.setItem('localConfig', JSON.stringify(config));
            
            alert("¡Todo guardado correctamente!");
            location.reload(); // Recarga para volver a modo cliente
        }
    </script>
</body>
</html>
